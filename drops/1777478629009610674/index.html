<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <meta name="description" content="The Dragon Crew - Ice Dragon Exhale Experience">
     <title>The Dragon Crew - Ice Dragon</title>
     <link rel="stylesheet" href="styles.css">
</head>
<body>
     <div class="container" role="main">
         <header class="header">
             <h1>The Dragon Crew</h1>
             <p class="subtitle">Ice Dragon • Exhale Mechanic</p>
         </header>

         <div class="dragon-stage locked" id="dragon-stage">
             <canvas id="particle-canvas" aria-hidden="true"></canvas>

             <div class="dragon-visual" id="dragon-visual">
                 <div class="dragon-body" id="dragon-body">
                     <div class="dragon-head">
                         <div class="dragon-horn left" aria-hidden="true"></div>
                         <div class="dragon-horn right" aria-hidden="true"></div>
                         <div class="dragon-eye" id="dragon-eye-left" aria-hidden="true"></div>
                         <div class="dragon-eye" id="dragon-eye-right" aria-hidden="true"></div>
                         <div class="dragon-mouth" id="dragon-mouth" aria-hidden="true"></div>
                     </div>
                     <div class="dragon-neck" aria-hidden="true"></div>
                     <div class="dragon-wing left" id="left-wing" aria-hidden="true"></div>
                     <div class="dragon-wing right" id="right-wing" aria-hidden="true"></div>
                 </div>
                 <div class="exhale-effect" id="exhale-effect" aria-hidden="true"></div>
             </div>

             <div class="status-display" id="status-display" aria-live="polite" role="status">
                 ⬡ TRIGGER LOCKED — READY
             </div>

             <div class="instructions" id="instructions" aria-live="polite">
                 <p>Press <kbd>SPACE</kbd> or click the dragon to trigger the exhale</p>
             </div>
         </div>

         <footer class="controls" role="toolbar" aria-label="Audio controls">
             <button 
                id="mute-btn" 
                aria-pressed="false"
                aria-label="Toggle audio mute"
                class="btn btn-icon"
             >
                 <span class="icon" aria-hidden="true">
                     <svg class="volume-icon visible" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                         <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.58 7-8.77s-2.99-7.86-7-8.77z"/>
                     </svg>
                     <svg class="volume-off-icon hidden" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                         <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.19-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                     </svg>
                 </span>
                 <span class="btn-label" id="mute-label">MUTE</span>
             </button>
         </footer>
     </div>
     <script src="audio.js"></script>
     <script src="app.js"></script>
</body>
</html>
