<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystalline Garden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #060610; }
  canvas { display: block; width: 100%; height: 100%; }
  #hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(180, 200, 230, 0.4);
    font-family: system-ui, sans-serif;
    font-size: 13px;
    letter-spacing: 0.5px;
    pointer-events: none;
    user-select: none;
    transition: opacity 2s ease;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">drag or hold to breathe</div>
<script>
/* ============================================================
   MASTER 56 BPM CLOCK
   ============================================================ */
const BPM = 56;
const BEAT_DURATION = 60 / BPM;
const QUANTIZATION_MS = 15;
const QUANTIZATION_BEAT = QUANTIZATION_MS / (BEAT_DURATION * 1000);

let startTime = 0;
let beatIndex = 0;

function getMasterTime() {
  return performance.now() - startTime;
}

function getCurrentBeatPhase() {
  const t = getMasterTime() / 1000;
  const rawBeat = t / BEAT_DURATION;
  const quantized = Math.round(rawBeat / (1 + QUANTIZATION_BEAT)) * (1 + QUANTIZATION_BEAT);
  return (quantized % 1);
}

function getBeatPulse(phase) {
  const t = phase;
  return 0.5 + 0.5 * Math.cos(t * Math.PI * 2 - Math.PI);
}

/* ============================================================
   DAMPED SINE EASING
   ============================================================ */
const FLUID_DAMPING = 0.65;

function dampedEase(from, to, t, phase) {
  const raw = (to - from) * (0.5 + 0.5 * Math.sin((t * Math.PI * 2 + phase * Math.PI) * FLUID_DAMPING));
  return from + raw * (1 - Math.exp(-3 * t));
}

function smoothstep(t) {
  return t * t * (3 - 2 * t);
}

/* ============================================================
   BREATH INTENSITY INPUT
   ============================================================ */
let breathIntensity = 0;
let breathIntensityFiltered = 0;
const LOWPASS_ALPHA = 0.06;
let isEngaged = false;
let releaseTimer = 0;
const RELEASE_DECAY = 0.015;

function updateBreathIntensity(raw) {
  breathIntensity = Math.max(0, Math.min(1, raw));
  breathIntensityFiltered += (breathIntensity - breathIntensityFiltered) * LOWPASS_ALPHA;
  return breathIntensityFiltered;
}

/* ============================================================
   STATE MACHINE: FROST → MOSS → GEODE
   ============================================================ */
const STATE_FROST = 0;
const STATE_MOSS = 1;
const STATE_GEODE = 2;

let currentState = STATE_FROST;
let stateBlend = 0;
let frostLevel = 1;
let mossLevel = 0;
let geodeLevel = 0;

const FROST_THRESHOLD = 0.15;
const MOSS_THRESHOLD = 0.45;
const GEODE_THRESHOLD = 0.7;

function updateStateMachine() {
  const v = breathIntensityFiltered;

  frostLevel = Math.max(0, 1 - smoothstep(Math.max(0, v - FROST_THRESHOLD) / (MOSS_THRESHOLD - FROST_THRESHOLD)));
  mossLevel = Math.max(0, 1 - smoothstep(Math.max(0, v - MOSS_THRESHOLD) / (GEODE_THRESHOLD - MOSS_THRESHOLD)));
  mossLevel *= smoothstep(Math.max(0, v - FROST_THRESHOLD) / (MOSS_THRESHOLD - FROST_THRESHOLD));
  geodeLevel = smoothstep(Math.max(0, v - GEODE_THRESHOLD) / (1 - GEODE_THRESHOLD));

  if (v > FROST_THRESHOLD && v <= MOSS_THRESHOLD) currentState = STATE_MOSS;
  else if (v > GEODE_THRESHOLD) currentState = STATE_GEODE;
  else currentState = STATE_FROST;

  stateBlend = v;
}

/* ============================================================
   PROCEDURAL AUDIO — 3 LAYERS
   ============================================================ */
let audioCtx = null;
let audioStarted = false;

function initAudio() {
  if (audioStarted) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioStarted = true;

  /* ----- Layer 1: Sea/Water — tidal swell ----- */
  const l1Gain = audioCtx.createGain();
  l1Gain.gain.value = 0;
  const l1Filter = audioCtx.createBiquadFilter();
  l1Filter.type = 'lowpass';
  l1Filter.frequency.value = 180;
  l1Filter.Q.value = 1.5;

  for (let i = 0; i < 3; i++) {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = [68, 102, 136][i];
    osc.connect(l1Filter);
    osc.start();
  }
  l1Filter.connect(l1Gain);
  l1Gain.connect(audioCtx.destination);

  /* ----- Layer 2: Ice/Snow — crystalline chimes ----- */
  const l2Gain = audioCtx.createGain();
  l2Gain.gain.value = 0;
  const l2Filter = audioCtx.createBiquadFilter();
  l2Filter.type = 'highpass';
  l2Filter.frequency.value = 2200;
  l2Filter.Q.value = 0.8;

  for (let i = 0; i < 4; i++) {
    const osc = audioCtx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = [1200, 1568, 1866, 2093][i];
    osc.connect(l2Filter);
    osc.start();
  }
  l2Filter.connect(l2Gain);
  l2Gain.connect(audioCtx.destination);

  /* ----- Layer 3: Fire/Lava — warm pads ----- */
  const l3Gain = audioCtx.createGain();
  l3Gain.gain.value = 0;
  const l3Filter = audioCtx.createBiquadFilter();
  l3Filter.type = 'lowpass';
  l3Filter.frequency.value = 350;
  l3Filter.Q.value = 2;

  for (let i = 0; i < 4; i++) {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = [98, 127, 146, 196][i];
    osc.connect(l3Filter);
    osc.start();
  }
  l3Filter.connect(l3Gain);
  l3Gain.connect(audioCtx.destination);

  window._audioLayers = { l1Gain, l2Gain, l3Gain };
}

function updateAudio() {
  if (!audioStarted) return;
  const { l1Gain, l2Gain, l3Gain } = window._audioLayers;
  const phase = getCurrentBeatPhase();
  const pulse = getBeatPulse(phase);
  const v = breathIntensityFiltered;
  const now = audioCtx.currentTime;

  /* Layer 1: tidal swell — always present, modulated by breath */
  const l1Target = (0.08 + pulse * 0.04) * (0.5 + v * 0.5);
  l1Gain.gain.setTargetAtTime(l1Target, now, 0.3);

  /* Layer 2: chimes — appear in frost/early moss phase */
  const l2Target = (1 - v) * pulse * 0.03;
  l2Gain.gain.setTargetAtTime(Math.max(0, l2Target), now, 0.15);

  /* Layer 3: warm pad — geode bloom */
  const l3Target = geodeLevel * (0.06 + pulse * 0.03);
  l3Gain.gain.setTargetAtTime(l3Target, now, 0.4);
}

/* ============================================================
   CANVAS & PARTICLES
   ============================================================ */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  initSceneObjects();
}
window.addEventListener('resize', resize);
resize();

/* ----- Frost crystals: procedural hexagonal clusters ----- */
class FrostCrystal {
  constructor(x, y, size, angle, layer) {
    this.x = x; this.y = y;
    this.size = size; this.angle = angle;
    this.baseAlpha = 0.3 + layer * 0.1;
    this.phase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.5 + Math.random() * 0.5;
  }
  draw(ctx, frostLevel, beatPhase) {
    const pulse = getBeatPulse(beatPhase);
    const breathe = Math.sin(performance.now() / 3000 * this.pulseSpeed + this.phase) * 0.15;
    const alpha = this.baseAlpha * frostLevel * (0.7 + pulse * 0.3 + breathe);
    const sz = this.size * (1 + breathe * 0.3);

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.globalAlpha = Math.max(0, alpha);

    /* Gaussian-blurred crystal arm */
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI * 2 / 6) * i;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(
        Math.cos(a) * sz,
        Math.sin(a) * sz
      );
      ctx.strokeStyle = `rgba(200, 220, 255, ${0.6 + pulse * 0.2})`;
      ctx.lineWidth = 1.5 * sz / 30;
      ctx.stroke();
    }

    /* Glow core */
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, sz * 0.5);
    grad.addColorStop(0, `rgba(220, 240, 255, ${alpha * 0.5})`);
    grad.addColorStop(1, `rgba(220, 240, 255, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, sz * 0.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

/* ----- Moss particles ----- */
class MossParticle {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.size = 2 + Math.random() * 4;
    this.hue = 90 + Math.random() * 40;
    this.phase = Math.random() * Math.PI * 2;
  }
  draw(ctx, mossLevel, beatPhase) {
    const pulse = getBeatPulse(beatPhase);
    const breathe = Math.sin(performance.now() / 4000 + this.phase) * 0.1;
    const alpha = mossLevel * (0.4 + pulse * 0.2 + breathe);
    const sz = this.size * (1 + breathe * 0.2);

    this.x += this.vx * mossLevel;
    this.y += this.vy * mossLevel;

    ctx.save();
    ctx.globalAlpha = Math.max(0, alpha);
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, sz * 2);
    g.addColorStop(0, `hsla(${this.hue}, 50%, 55%, 0.7)`);
    g.addColorStop(1, `hsla(${this.hue}, 50%, 35%, 0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(this.x, this.y, sz * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

/* ----- Geode bloom segments ----- */
class GeodeBloom {
  constructor(ox, oy, angle, length, width) {
    this.ox = ox; this.oy = oy;
    this.angle = angle;
    this.length = length;
    this.width = width;
    this.phase = Math.random() * Math.PI * 2;
    this.hue = 260 + Math.random() * 60;
  }
  draw(ctx, geodeLevel, beatPhase) {
    if (geodeLevel < 0.01) return;
    const pulse = getBeatPulse(beatPhase);
    const breathe = Math.sin(performance.now() / 2500 + this.phase) * 0.08;
    const alpha = geodeLevel * (0.5 + pulse * 0.3 + breathe);
    const ext = this.length * geodeLevel * (1 + breathe);

    ctx.save();
    ctx.translate(this.ox, this.oy);
    ctx.rotate(this.angle);

    const g = ctx.createLinearGradient(0, 0, ext, 0);
    g.addColorStop(0, `hsla(${this.hue}, 70%, 60%, ${alpha})`);
    g.addColorStop(0.5, `hsla(${this.hue + 30}, 80%, 50%, ${alpha * 0.7})`);
    g.addColorStop(1, `hsla(${this.hue + 60}, 60%, 40%, 0)`);

    ctx.beginPath();
    ctx.moveTo(0, -this.width * 0.2);
    ctx.quadraticCurveTo(ext * 0.5, -this.width * (0.3 + pulse * 0.1), ext, 0);
    ctx.quadraticCurveTo(ext * 0.5, this.width * (0.3 + pulse * 0.1), 0, this.width * 0.2);
    ctx.closePath();
    ctx.fillStyle = g;
    ctx.fill();

    ctx.restore();
  }
}

/* ----- Generate scene objects (deferred until canvas sized) ----- */
const frostCrystals = [];
const mossParticles = [];
let geodeBlooms = [];

function initSceneObjects() {
  frostCrystals.length = 0;
  for (let i = 0; i < 60; i++) {
    frostCrystals.push(new FrostCrystal(
      Math.random() * W,
      Math.random() * H,
      12 + Math.random() * 35,
      Math.random() * Math.PI * 2,
      Math.floor(Math.random() * 3)
    ));
  }

  mossParticles.length = 0;
  for (let i = 0; i < 200; i++) {
    mossParticles.push(new MossParticle(Math.random() * W, Math.random() * H));
  }

  geodeBlooms = [];
  const cx = W * 0.5, cy = H * 0.5;
  for (let i = 0; i < 24; i++) {
    const a = (Math.PI * 2 / 24) * i + Math.random() * 0.2;
    geodeBlooms.push(new GeodeBloom(cx, cy, a, W * 0.2 + Math.random() * W * 0.15, 2 + Math.random() * 5));
  }
}

/* ============================================================
   INPUT HANDLING
   ============================================================ */
let rawBreath = 0;
let lastPointerX = 0, lastPointerY = 0;
let pointerDown = false;

canvas.addEventListener('pointerdown', (e) => {
  pointerDown = true;
  initAudio();
  lastPointerX = e.clientX;
  lastPointerY = e.clientY;
  document.getElementById('hint').style.opacity = '0';
});

canvas.addEventListener('pointerup', () => { pointerDown = false; });
canvas.addEventListener('pointermove', (e) => {
  if (!pointerDown) return;
  const dx = e.clientX - lastPointerX;
  const dy = e.clientY - lastPointerY;
  lastPointerX = e.clientX;
  lastPointerY = e.clientY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  rawBreath = Math.max(rawBreath, Math.min(1, dist / 200 + 0.1));
});

/* Hold-based input — breath ramps while held */
let holdStart = 0;
canvas.addEventListener('pointerdown', () => { if (!holdStart) holdStart = performance.now(); });
canvas.addEventListener('pointerup', () => { holdStart = 0; });

/* ============================================================
   RENDER LOOP — 60fps, zero snapping
   ============================================================ */
let lastFrameTime = 0;
const FRAME_DURATION = 1000 / 60;

function clearCanvas() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#060610');
  g.addColorStop(0.5, '#0a0a1a');
  g.addColorStop(1, '#080812');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  /* Subtle ambient haze */
  const hazeAlpha = 0.03 + breathIntensityFiltered * 0.04;
  const hg = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, W * 0.6);
  hg.addColorStop(0, `rgba(120, 140, 200, ${hazeAlpha})`);
  hg.addColorStop(1, 'transparent');
  ctx.fillStyle = hg;
  ctx.fillRect(0, 0, W, H);
}

function render(timestamp) {
  requestAnimationFrame(render);

  /* Frame rate quantization — ±15ms window */
  if (startTime === 0) {
    startTime = performance.now();
  }

  const elapsed = timestamp - lastFrameTime;
  if (elapsed < FRAME_DURATION - QUANTIZATION_MS) {
    requestAnimationFrame(render);
    return;
  }
  lastFrameTime = timestamp;

  /* --- Update --- */
  /* Hold ramp */
  if (pointerDown && holdStart) {
    const holdDur = (performance.now() - holdStart) / 6000;
    rawBreath = Math.max(rawBreath, Math.min(1, holdDur));
   }
  if (!pointerDown) {
    rawBreath *= 0.96;
   }
  updateBreathIntensity(rawBreath);

  /* Release cooling */
  if (!pointerDown && breathIntensityFiltered > 0.01) {
    releaseTimer += RELEASE_DECAY;
  } else if (!pointerDown && breathIntensityFiltered <= 0.01) {
    releaseTimer = 0;
  }

  updateStateMachine();

  const beatPhase = getCurrentBeatPhase();

  /* --- Audio --- */
  updateAudio();

  /* --- Draw --- */
  ctx.save();
  clearCanvas();

  /* Frost layer — with Gaussian blur */
  if (frostLevel > 0.01) {
    ctx.filter = `blur(${frostLevel * 6}px)`;
    frostCrystals.forEach(c => c.draw(ctx, frostLevel, beatPhase));
    ctx.filter = 'none';
  }

  /* Moss layer — soft gradient falloff */
  if (mossLevel > 0.01) {
    mossParticles.forEach(p => p.draw(ctx, mossLevel, beatPhase));
  }

  /* Geode bloom — central node pulse */
  if (geodeLevel > 0.01) {
    const cx = W * 0.5;
    const cy = H * 0.5;

    /* Central glow */
    const pulse = getBeatPulse(beatPhase);
    const glowSize = 60 + geodeLevel * 120 * devicePixelRatio;
    const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowSize);
    cg.addColorStop(0, `hsla(280, 80%, 70%, ${geodeLevel * (0.4 + pulse * 0.2)})`);
    cg.addColorStop(0.4, `hsla(260, 70%, 50%, ${geodeLevel * (0.2 + pulse * 0.1)})`);
    cg.addColorStop(1, 'transparent');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(cx, cy, glowSize, 0, Math.PI * 2);
    ctx.fill();

    for (const b of geodeBlooms) {
      b.draw(ctx, geodeLevel, beatPhase);
     }
  }

  /* Subtle vignette */
  const vg = ctx.createRadialGradient(W * 0.5, H * 0.5, W * 0.2, W * 0.5, H * 0.5, W * 0.8);
  vg.addColorStop(0, 'transparent');
  vg.addColorStop(1, 'rgba(0, 0, 0, 0.5)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  ctx.restore();
}

requestAnimationFrame(render);
</script>
</body>
</html>
