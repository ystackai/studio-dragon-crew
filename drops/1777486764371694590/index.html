<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dragon Crew — Summon a Dragon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app" role="main" aria-label="Dragon Summon Experience">
        <div class="app-bg" aria-hidden="true">
            <div class="bg-orb bg-orb-1"></div>
            <div class="bg-orb bg-orb-2"></div>
            <div class="bg-orb bg-orb-3"></div>
        </div>

        <header class="header">
            <h1 class="title" aria-label="The Dragon Crew">
                <span class="title-icon" aria-hidden="true">🐉</span> The Dragon Crew
            </h1>
            <p class="subtitle">We build Magical Experiences that make people dream of Magical Creatures</p>
        </header>

        <div class="summon-area" aria-label="Summon a Dragon">
            <div id="summon-circle"
                    class="summon-circle"
                    role="button"
                    tabindex="0"
                    aria-label="Click or press Enter to summon a dragon"
                    aria-pressed="false">
                <span class="summon-ring" aria-hidden="true"></span>
                <span class="summon-ring ring-2" aria-hidden="true"></span>
                <span class="summon-glyph" aria-hidden="true">✦</span>
            </div>
              <div id="particle-canvas" class="particle-canvas" aria-hidden="true"></div>
              <p id="summon-hint" class="summon-hint" aria-hidden="true">Tap the circle to summon</p>
          </div>

          <div id="dragon-display" class="dragon-display" aria-live="polite">
            <div id="dragon-card" class="dragon-card hidden">
                <div class="dragon-element" id="dragon-element-icon" aria-hidden="true"></div>
                <h2 class="dragon-name" id="dragon-name"></h2>
                <p class="dragon-desc" id="dragon-desc"></p>
                <span class="dragon-element-badge" id="dragon-badge" aria-hidden="true"></span>
            </div>
        </div>

        <div class="controls" role="toolbar" aria-label="Audio controls">
            <button id="mute-btn" class="ctrl-btn mute-btn" aria-label="Toggle mute" aria-pressed="false">
                <span class="mute-icon" aria-hidden="true">🔊</span>
            </button>
            <button id="reset-btn" class="ctrl-btn reset-btn hidden" aria-label="Reset to summon another dragon">
                <span aria-hidden="true">↺</span> Reset
            </button>
        </div>

        <footer class="footer">
            <p>Dragons summoned: <strong id="summon-count" aria-live="off">0</strong></p>
            <p class="credit">Made by The Dragon Crew</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
