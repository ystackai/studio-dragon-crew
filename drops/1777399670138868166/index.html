<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elemental Sanctuary</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
canvas { display: block; width: 100%; height: 100%; cursor: pointer; }
#start-overlay {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(10,10,15,0.92); z-index: 10; flex-direction: column; gap: 16px;
  transition: opacity 0.8s ease;
}
#start-overlay.hidden { opacity: 0; pointer-events: none; }
#start-overlay h1 { color: #c8b8a8; font-family: system-ui, sans-serif; font-size: 28px; font-weight: 300; letter-spacing: 2px; }
#start-overlay p { color: #887766; font-family: system-ui, sans-serif; font-size: 14px; max-width: 360px; text-align: center; line-height: 1.5; }
#start-btn {
  margin-top: 12px; padding: 14px 40px; border: 1px solid rgba(200,184,168,0.3);
  background: rgba(200,184,168,0.08); color: #c8b8a8; font-size: 16px;
  font-family: system-ui, sans-serif; cursor: pointer; border-radius: 24px;
  transition: all 0.3s ease;
}
#start-btn:hover { background: rgba(200,184,168,0.18); border-color: rgba(200,184,168,0.5); }
#ui-layer {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 20px; align-items: center; z-index: 5;
  font-family: system-ui, sans-serif; font-size: 12px; color: rgba(200,184,168,0.5);
}
.element-icon { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(200,184,168,0.15);
  opacity: 0.3; transition: all 0.5s ease; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.element-icon.active { opacity: 1; border-color: rgba(200,184,168,0.6); box-shadow: 0 0 12px rgba(200,184,168,0.2); }
#breath-indicator {
  position: fixed; top: 20px; right: 20px; z-index: 5;
  font-family: system-ui, sans-serif; font-size: 11px; color: rgba(200,184,168,0.4);
  text-align: right; line-height: 1.8;
}
#lock-msg {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: system-ui, sans-serif; font-size: 18px; color: #c8b8a8;
  opacity: 0; transition: opacity 1.5s ease; z-index: 8; pointer-events: none;
  text-shadow: 0 0 20px rgba(200,184,168,0.5);
}
#lock-msg.visible { opacity: 1; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="start-overlay">
  <h1>Elemental Sanctuary</h1>
  <p>Hold to inhale, release to exhale. Drag vertically to shift elements. Achieve 3 breath cycles to lock the sanctuary.</p>
  <button id="start-btn">Enter Sanctuary</button>
</div>

<div id="ui-layer">
  <div class="element-icon" data-el="water" title="Water">🌊</div>
  <div class="element-icon" data-el="fire" title="Fire">🔥</div>
  <div class="element-icon" data-el="ice" title="Ice">❄️</div>
  <div class="element-icon" data-el="lava" title="Lava">🌋</div>
</div>

<div id="breath-indicator">
  <div id="phase-label">Phase: —</div>
  <div id="cycle-label">Cycles: 0 / 3</div>
  <div id="fps-label">FPS: —</div>
</div>

<div id="lock-msg">Sanctuary Locked</div>

<script>
// ============================================================
// PROCEDURAL AUDIO ENGINE
// ============================================================
const AudioEngine = (() => {
  let ctx = null;
  let masterGain = null;
  let reverbGain = null;
  let dryGain = null;
  let convolver = null;
  let droneOscillators = [];
  let referenceOsc = null;
  let inhaleNode = null;
  let exhaleNode = null;
  let lowpassFilter = null;
  let dragPitch = null;
  let initialized = false;
  let currentElement = 'water';
  let autoLockActive = false;
  let chimeInterval = null;

  // Pentatonic scale frequencies (C D E G A across octaves)
  const PENTATONIC = {
    water: [130.81, 146.83, 164.81, 196.00, 220.00],
    fire:  [138.59, 155.56, 174.61, 207.65, 233.08],
    ice:   [123.47, 138.59, 155.56, 185.00, 207.65],
    lava:  [146.83, 164.81, 185.00, 220.00, 246.94]
  };

  // Reverb impulse generation
  function createReverbImpulse(duration, decay) {
    const rate = ctx.sampleRate;
    const length = rate * duration;
    const impulse = ctx.createBuffer(2, length, rate);
    for (let ch = 0; ch < 2; ch++) {
      const data = impulse.getChannelData(ch);
      for (let i = 0; i < length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
      }
    }
    return impulse;
  }

  function init() {
    if (initialized) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    initialized = true;

    // Master chain: masterGain -> destination
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.55;
    masterGain.connect(ctx.destination);

    // Split for reverb mix
    dryGain = ctx.createGain();
    dryGain.gain.value = 0.7;
    reverbGain = ctx.createGain();
    reverbGain.gain.value = 0.15;

    convolver = ctx.createConvolver();
    convolver.buffer = createReverbImpulse(3.5, 2.5);

    dryGain.connect(masterGain);
    reverbGain.connect(convolver);
    convolver.connect(masterGain);

    // Low-pass filter for sweep system
    lowpassFilter = ctx.createBiquadFilter();
    lowpassFilter.type = 'lowpass';
    lowpassFilter.frequency.value = 400;
    lowpassFilter.Q.value = 0.7;
    lowpassFilter.connect(dryGain);
    lowpassFilter.connect(reverbGain);

    // Drag pitch modulation node
    dragPitch = ctx.createGain();
    dragPitch.gain.value = 0;
    dragPitch.connect(dryGain);

    startReferenceTone();
    startDrone();
  }

  // 432Hz grounding reference
  function startReferenceTone() {
    referenceOsc = ctx.createOscillator();
    referenceOsc.type = 'sine';
    referenceOsc.frequency.value = 432;
    const refGain = ctx.createGain();
    refGain.gain.value = 0.025;
    referenceOsc.connect(refGain);
    refGain.connect(masterGain);
    referenceOsc.start();
  }

  // Pentatonic ambient drone
  function startDrone() {
    const freqs = PENTATONIC[currentElement];
    const numVoices = 3;
    for (let i = 0; i < numVoices; i++) {
      const osc = ctx.createOscillator();
      osc.type = i === 0 ? 'sine' : (i === 1 ? 'triangle' : 'sine');
      osc.frequency.value = freqs[i % freqs.length] / (i === 1 ? 2 : 1);
      const g = ctx.createGain();
      g.gain.value = 0.06;

      // Subtle vibrato LFO
      const lfo = ctx.createOscillator();
      lfo.frequency.value = 0.3 + i * 0.15;
      const lfoGain = ctx.createGain();
      lfoGain.gain.value = 1.5;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      lfo.start();

      osc.connect(g);
      g.connect(dryGain);
      g.connect(reverbGain);
      osc.start();
      droneOscillators.push({ osc, gain: g, lfo, lfoGain });
    }
  }

  function updateDroneForElement() {
    const freqs = PENTATONIC[currentElement];
    droneOscillators.forEach((v, i) => {
      const baseFreq = freqs[i % freqs.length] / (i === 1 ? 2 : 1);
      v.osc.frequency.setTargetAtTime(baseFreq, ctx.currentTime, 0.4);
    });
  }

  // Inhale sweep: rising low-pass with increasing harmonic complexity
  function triggerInhale() {
    stopPrevSweep();
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = PENTATONIC[currentElement][0];
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.6);

    const extra = ctx.createOscillator();
    extra.type = 'triangle';
    extra.frequency.value = PENTATONIC[currentElement][2];
    const eg = ctx.createGain();
    eg.gain.setValueAtTime(0, ctx.currentTime);
    eg.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 0.8);

    osc.connect(g);
    extra.connect(eg);
    g.connect(lowpassFilter);
    eg.connect(lowpassFilter);

    lowpassFilter.frequency.setValueAtTime(300, ctx.currentTime);
    lowpassFilter.frequency.exponentialRampToValueAtTime(2800, ctx.currentTime + 1.2);

    osc.start();
    extra.start();
    inhaleNode = { osc, gain: g, extra, extraGain: eg };
  }

  // Exhale: decaying pad with reverb tail
  function triggerExhale(duration) {
    stopPrevSweep();
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = PENTATONIC[currentElement][3];
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

    const pad = ctx.createOscillator();
    pad.type = 'triangle';
    pad.frequency.value = PENTATONIC[currentElement][4] / 2;
    const pg = ctx.createGain();
    pg.gain.setValueAtTime(0.1, ctx.currentTime);
    pg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration * 0.8);

    osc.connect(g);
    pad.connect(pg);
    g.connect(lowpassFilter);
    pg.connect(lowpassFilter);

    lowpassFilter.frequency.setValueAtTime(2000, ctx.currentTime);
    lowpassFilter.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + duration);

    osc.start();
    pad.start();
    osc.stop(ctx.currentTime + duration + 0.1);
    pad.stop(ctx.currentTime + duration + 0.1);
  }

  function stopPrevSweep() {
    if (inhaleNode) {
      try {
        inhaleNode.osc.stop();
        inhaleNode.extra.stop();
      } catch(e) {}
      inhaleNode = null;
    }
  }

  // Interaction sounds
  function playTap() {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.08);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    osc.connect(g);
    g.connect(dryGain);
    g.connect(reverbGain);
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
  }

  function playHold() {
    if (inhaleNode) return;
    triggerInhale();
  }

  function playRelease() {
    if (autoLockActive) return;
    triggerExhale(2.5);
  }

  function playDrag() {
    if (!dragPitch.gain || dragPitch.gain.value >= 0.05) return;
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    const freq = PENTATONIC[currentElement][Math.floor(Math.random() * 5)];
    osc.frequency.value = freq * (0.9 + Math.random() * 0.2);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.06, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.03, ctx.currentTime + 0.15);
    osc.connect(g);
    g.connect(dryGain);
    osc.start();
    setTimeout(() => { try { osc.stop(); } catch(e) {} }, 250);
  }

  function playLockIn() {
    if (chimeInterval) clearInterval(chimeInterval);
    const now = ctx.currentTime;

    // Resonant chime with 2s decay
    const freqs = PENTATONIC[currentElement];
    freqs.forEach((f, i) => {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = f * 2;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, now + i * 0.08);
      g.gain.linearRampToValueAtTime(0.12, now + i * 0.08 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 2.0);
      osc.connect(g);
      g.connect(reverbGain);
      g.connect(dryGain);
      osc.start(now + i * 0.08);
      osc.stop(now + i * 0.08 + 2.5);
    });

      // Start 4/4 pulse chime
    autoLockActive = true;
    let beatCount = 0;
    const beatFrequencies = [freqs[0] * 2, freqs[2] * 2, freqs[1] * 2, freqs[4] * 2];
    const pulseChime = () => {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = beatFrequencies[beatCount % 4];
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.08, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
      osc.connect(g);
      g.connect(reverbGain);
      osc.start();
      osc.stop(ctx.currentTime + 1.0);
    };
    pulseChime();
    chimeInterval = setInterval(() => { beatCount++; if (autoLockActive) pulseChime(); }, 500);
  }

  function stopChimes() {
    if (chimeInterval) { clearInterval(chimeInterval); chimeInterval = null; }
  }

  function setReverbTail(length) {
    // Length 0..1 maps to 0.5s..6s reverb
    const dur = 0.5 + length * 5.5;
    convolver.buffer = createReverbImpulse(dur, 2.0);
  }

  function setElement(el) {
    if (el === currentElement) return;
    currentElement = el;
    updateDroneForElement();
  }

  function setLowpassFrequency(freq) {
    if (lowpassFilter) {
      lowpassFilter.frequency.setTargetAtTime(freq, ctx.currentTime, 0.05);
    }
  }

  function setMasterVolume(v) {
    if (masterGain) masterGain.gain.setTargetAtTime(v, ctx.currentTime, 0.05);
  }

  return {
    init, triggerInhale, triggerExhale, playTap, playHold, playRelease,
    playDrag, playLockIn, stopChimes, setReverbTail, setElement,
    setLowpassFrequency, setMasterVolume,
    getCtx: () => ctx, getState: () => ({ currentElement, autoLockActive, initialized })
  };
})();

// ============================================================
// VISUAL RENDERER (Canvas 2D)
// ============================================================
const Visuals = (() => {
  const canvas = document.getElementById('c');
  const glCanvas = document.createElement('canvas');
  let W, H, cx, cy;
  let particles = [];
  let breathPhase = 0;      // 0..1 for full inhale+exhale cycle
  let breathDir = 1;         // 1 = inhaling, -1 = exhaling
  let breathProgress = 0;
  let elementIndex = 0;
  const elements = ['water', 'fire', 'ice', 'lava'];
  let elementalTransition = 0;  // 0..1 lerp to new element
  let previousElement = 'water';
  let locked = false;
  let lockPulse = 0;
  let frameCount = 0;
  let lastFpsTime = 0;
  let currentFps = 60;

  // Elemental color palettes
  const PALETTES = {
    water: { primary: '#00bcd4', secondary: '#006064', glow: 'rgba(0,188,212,0.15)', bg: '#050d12' },
    fire:  { primary: '#ff7043', secondary: '#bf360c', glow: 'rgba(255,112,67,0.15)', bg: '#0f0805' },
    ice:   { primary: '#b3e5fc', secondary: '#4fc3f7', glow: 'rgba(179,229,252,0.12)', bg: '#060a12' },
    lava:  { primary: '#c62828', secondary: '#ff5722', glow: 'rgba(198,40,40,0.15)', bg: '#0c0505' }
  };

  function resize() {
    W = canvas.width = window.innerWidth * devicePixelRatio;
    H = canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    cx = W / 2;
    cy = H / 2;
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return { r, g, b };
  }

  function lerpColor(c1, c2, t) {
    return {
      r: c1.r + (c2.r - c1.r) * t,
      g: c1.g + (c2.g - c1.g) * t,
      b: c1.b + (c2.b - c1.b) * t
    };
  }

  function rgbStr(c) { return `rgb(${Math.round(c.r)},${Math.round(c.g)},${Math.round(c.b)})`; }
  function rgbaStr(c, a) { return `rgba(${Math.round(c.r)},${Math.round(c.g)},${Math.round(c.b)},${a})`; }

  // Particle system
  class Particle {
    constructor(x, y, type) {
      this.x = x; this.y = y;
      const angle = Math.random() * Math.PI * 2;
      const speed = 0.3 + Math.random() * 1.5;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.life = 1;
      this.decay = 0.003 + Math.random() * 0.008;
      this.size = 1 + Math.random() * 3;
      this.type = type;
      this.phase = Math.random() * Math.PI * 2;
    }
    update() {
      if (this.type === 'fire') this.vy -= 0.02;
      if (this.type === 'lava') this.vy += 0.01;
      this.x += this.vx * (locked ? 0.7 : 1);
      this.y += this.vy * (locked ? 0.7 : 1);
      this.phase += 0.02;
      this.life -= this.decay;
    }
    draw(ctx, color) {
      const s = this.size * (locked ? 0.8 + 0.2 * Math.sin(this.phase) : 1);
      ctx.beginPath();
      ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
      ctx.fillStyle = rgbaStr(color, this.life * 0.6);
      ctx.fill();
    }
  }

  function emitParticles(count, type) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = 30 + Math.random() * 80;
      particles.push(new Particle(
        cx + Math.cos(angle) * r,
        cy + Math.sin(angle) * r,
        type
        ));
    }
  }

  function setElement(el) {
    previousElement = elements[elementIndex];
    elementIndex = elements.indexOf(el);
    elementalTransition = 0;
  }

  function setLocked(state) {
    locked = state;
    lockPulse = 1;
    if (state) emitParticles(40, elements[elementIndex]);
  }

  function updateBreathPhase(dt, phase, direction) {
    breathProgress = phase;
    breathDir = direction;
  }

  // Background breathing displacement
  function drawBackground(baseColor, t) {
    const { r: br, g: bg, b: bb } = baseColor;
    // Breathing displacement: gentle sinusoidal variation
    const breathOffset = Math.sin(t * 0.5) * 0.05;
    const grad = ctx.createRadialGradient(
      cx + Math.sin(t * 0.3) * 20,
      cy + Math.cos(t * 0.4) * 20,
      0,
      cx, cy, Math.max(W, H) * 0.7
    );
    grad.addColorStop(0, rgbaStr({r:br+20, g:bg+15, b:bb+10}, 0.3 + breathOffset));
    grad.addColorStop(0.5, rgbaStr(baseColor, 0.15));
    grad.addColorStop(1, rgbStr(baseColor));
    ctx.fillStyle = rgbStr(baseColor);
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // Central breath ring
  function drawBreathRing(t, breathVal, pal, transitionT) {
    const baseRadius = Math.min(W, H) * 0.12;
    const breathExpansion = baseRadius * (0.3 + breathVal * 0.4);
    const radius = baseRadius + breathExpansion;

    // Ring glow
    const glowGrad = ctx.createRadialGradient(cx, cy, radius * 0.8, cx, cy, radius * 1.4);
    glowGrad.addColorStop(0, rgbaStr(pal, 0.05 + (locked ? 0.05 : 0)));
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(0, 0, W, H);

    // Main ring
    ctx.beginPath();
    ctx.arc(cx, cy, radius * devicePixelRatio, 0, Math.PI * 2);
    ctx.strokeStyle = rgbaStr(pal, 0.25 + breathVal * 0.3);
    ctx.lineWidth = (locked ? 2.5 : 1.5) * devicePixelRatio;
    ctx.stroke();

    // Progress arc for breath phase
    if (breathDir === 1) {
      ctx.beginPath();
      ctx.arc(cx, cy, (radius + 12) * devicePixelRatio, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * breathVal);
      ctx.strokeStyle = rgbaStr(pal, 0.4 + breathVal * 0.4);
      ctx.lineWidth = 2 * devicePixelRatio;
      ctx.shadowColor = rgbStr(pal);
      ctx.shadowBlur = 12 * devicePixelRatio;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Inner pulsing core dot
    const coreSize = (8 + breathVal * 12) * devicePixelRatio;
    const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreSize);
    coreGrad.addColorStop(0, rgbaStr(pal, 0.6 + (locked ? 0.3 : 0)));
    coreGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, coreSize, 0, Math.PI * 2);
    ctx.fill();

    if (locked && lockPulse > 0) {
      const lpR = (radius + lockPulse * 100) * devicePixelRatio;
      ctx.beginPath();
      ctx.arc(cx, cy, lpR, 0, Math.PI * 2);
      ctx.strokeStyle = rgbaStr(pal, lockPulse * 0.2);
      ctx.lineWidth = 1 * devicePixelRatio;
      ctx.stroke();
    }
  }

  // Elemental aura
  function drawAura(t, pal, breathVal) {
    const auraRadius = Math.min(W, H) * (0.25 + breathVal * 0.15 + (locked ? 0.05 : 0));
    const grad = ctx.createRadialGradient(cx, cy, auraRadius * 0.5, cx, cy, auraRadius);
    grad.addColorStop(0, rgbaStr(pal, 0.04 * (locked ? 1.5 : 1)));
    grad.addColorStop(0.6, rgbaStr(pal, 0.02));
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // Crystal lines for ice element
  function drawCrystal_lines(t, pal, breathVal) {
    if (elementIndex !== 2) return;
    const numLines = 6;
    const rBase = Math.min(W, H) * 0.18;
    for (let i = 0; i < numLines; i++) {
      const angle = (i / numLines) * Math.PI * 2 + t * 0.2;
      const outerR = rBase * (1.5 + breathVal * 0.3);
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(angle) * rBase * devicePixelRatio,
                 cy + Math.sin(angle) * rBase * devicePixelRatio);
      ctx.lineTo(cx + Math.cos(angle) * outerR * devicePixelRatio,
                 cy + Math.sin(angle) * outerR * devicePixelRatio);
      ctx.strokeStyle = rgbaStr(pal, 0.15 + breathVal * 0.15);
      ctx.lineWidth = 1 * devicePixelRatio;
      ctx.stroke();
    }
  }

  function drawLockedPulse(t, pal) {
    if (!locked) return;
    // 4/4 visual pulse
    const beat = (t * 2) % 2; // 2 beats per second = 4/4
    const pulseIntensity = Math.exp(-beat * 3);
    const r = Math.min(W, H) * 0.15;

    ctx.beginPath();
    ctx.arc(cx, cy, r * (1 + pulseIntensity * 0.05) * devicePixelRatio, 0, Math.PI * 2);
    ctx.strokeStyle = rgbaStr(pal, 0.3 * pulseIntensity);
    ctx.lineWidth = 3 * devicePixelRatio;
    ctx.shadowColor = rgbStr(pal);
    ctx.shadowBlur = 15 * devicePixelRatio * pulseIntensity;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  let animTime = 0;
  let prevTimestamp = 0;

  function render(timestamp) {
    const dt = prevTimestamp ? (timestamp - prevTimestamp) / 1000 : 0.016;
    prevTimestamp = timestamp;
    animTime += dt;

    // FPS calc
    frameCount++;
    if (timestamp - lastFpsTime >= 1000) {
      currentFps = Math.round(frameCount * 1000 / (timestamp - lastFpsTime));
      frameCount = 0;
      lastFpsTime = timestamp;
      document.getElementById('fps-label').textContent = `FPS: ${currentFps}`;
    }

    // Update
    elementalTransition = Math.min(1, elementalTransition + dt * 2.5);
    lockPulse = Math.max(0, lockPulse - dt * 0.4);

    // Current palette with transition
    const curEl = elements[elementIndex];
    const prevPal = hexToRgb(PALETTES[previousElement].primary);
    const curPal = hexToRgb(PALETTES[curEl].primary);
    const blended = lerpColor(prevPal, curPal, elementalTransition);

    const bgBase = hexToRgb(PALETTES[curEl].bg);
    const bgBlend = lerpColor(hexToRgb(PALETTES[previousElement].bg), bgBase, elementalTransition);

    // Clear and draw
    ctx.clearRect(0, 0, W, H);

    // Background breath displacement effect
    drawBackground(bgBlend, animTime);

    // Aura
    drawAura(animTime, blended, breathProgress);

    // Particles
    if (Math.random() < 0.3 + breathProgress * 0.4) {
      emitParticles(1, curEl);
    }
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.update(); p.draw(ctx, blended); });

    // Crystal lines for ice
    drawCrystal_lines(animTime, blended, breathProgress);

    // Breath ring
    drawBreathRing(animTime, breathProgress, blended, elementalTransition);

    // Locked pulse beat
    drawLockedPulse(animTime, blended);

    // UI updates
    const phaseLabel = document.getElementById('phase-label');
    phaseLabel.textContent = `Phase: ${breathDir === 1 ? 'Inhale' : 'Exhale'}`;
    phaseLabel.style.color = `rgba(${Math.round(blended.r)},${Math.round(blended.g)},${Math.round(blended.b)},0.7)`;

    // Element icons
    document.querySelectorAll('.element-icon').forEach(el => {
      el.classList.toggle('active', el.dataset.el === curEl);
      if (el.classList.contains('active')) {
        el.style.borderColor = `rgba(${Math.round(blended.r)},${Math.round(blended.g)},${Math.round(blended.b)},0.6)`;
        el.style.boxShadow = `0 0 12px rgba(${Math.round(blended.r)},${Math.round(blended.g)},${Math.round(blended.b)},0.3)`;
      } else {
        el.style.borderColor = 'rgba(200,184,168,0.15)';
        el.style.boxShadow = 'none';
      }
    });

    requestAnimationFrame(render);
  }

  // Init
  window.addEventListener('resize', resize);
  resize();

  // Start render loop
  requestAnimationFrame(render);

  return {
    setElement,
    setLocked,
    updateBreathPhase,
    emitParticles,
    getTime: () => animTime,
  };
})();

// ============================================================
// INPUT & STATE MANAGEMENT
// ============================================================
const App = (() => {
  let audioStarted = false;
  let breathCycles = 0;
  let isInhaling = false;
  let holdStartTime = 0;
  let dragging = false;
  let dragStartY = 0;
  let dragStartX = 0;
  let currentElementIndex = 0;
  let breathProgress = 0;
  let autoLockTimer = 0;
  let autoLockThreshold = 3; // 3 full cycles for auto-lock
  let locked = false;
  let reverbTail = 0.5; // 0..1

  const elements = ['water', 'fire', 'ice', 'lava'];
  const overlay = document.getElementById('start-overlay');
  const startBtn = document.getElementById('start-btn');
  const lockMsg = document.getElementById('lock-msg');
  const cycleLabel = document.getElementById('cycle-label');

  // Start audio on user gesture
  startBtn.addEventListener('click', () => {
    AudioEngine.init();
    audioStarted = true;
    overlay.classList.add('hidden');
    setTimeout(() => { overlay.style.display = 'none'; }, 900);
  });

  // Canvas interaction
  const canvas = document.getElementById('c');

  canvas.addEventListener('pointerdown', (e) => {
    if (!audioStarted) return;
    e.preventDefault();
    if (isInhaling) return;

    isInhaling = true;
    holdStartTime = performance.now();
    dragStartY = e.clientY;
    dragStartX = e.clientX;
    dragging = true;

    AudioEngine.playTap();
    AudioEngine.triggerInhale();
    Visuals.updateBreathPhase(0, 0, 1);
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!audioStarted || !dragging) return;
    e.preventDefault();

    const dy = e.clientY - dragStartY;
    const dx = e.clientX - dragStartX;

    // Vertical drag -> element shift
    if (Math.abs(dy) > 40) {
      const direction = dy > 0 ? 1 : -1;
      currentElementIndex = (currentElementIndex + direction + elements.length) % elements.length;
      const el = elements[currentElementIndex];
      AudioEngine.setElement(el);
      Visuals.setElement(el);
      dragStartY = e.clientY;
      AudioEngine.playDrag();
    }

    // Horizontal drag -> reverb tail
    if (Math.abs(dx) > 20) {
      reverbTail = Math.max(0, Math.min(1, reverbTail + dx * 0.001));
      AudioEngine.setReverbTail(reverbTail);
      dragStartX = e.clientX;
      AudioEngine.playDrag();
    }

    // Breath progress during hold
    const holdDuration = (performance.now() - holdStartTime) / 1000;
    breathProgress = Math.min(1, holdDuration / 2.5);
    const lpfFreq = 300 + breathProgress * 2500;
    AudioEngine.setLowpassFrequency(lpfFreq);
    Visuals.updateBreathPhase(performance.now() / 1000, breathProgress, 1);
  });

  canvas.addEventListener('pointerup', (e) => {
    if (!audioStarted) return;
    if (!isInhaling) return;
    e.preventDefault();

    isInhaling = false;
    dragging = false;

    // Calculate damping slope from hold duration and movement
    const holdDuration = (performance.now() - holdStartTime) / 1000;
    const dampingSlope = Math.max(0.5, Math.min(3, holdDuration * 0.8));

    AudioEngine.triggerExhale(dampingSlope);

     // Complete breath cycle
    breathCycles++;
    cycleLabel.textContent = `Cycles: ${breathCycles} / ${autoLockThreshold}`;

    if (breathCycles >= autoLockThreshold && !locked) {
      triggerAutoLock();
    }

    // Reset breath
    setTimeout(() => {
      breathProgress = 0;
      AudioEngine.setLowpassFrequency(400);
    }, dampingSlope * 1000);
  });

  canvas.addEventListener('pointerleave', () => {
    if (isInhaling) {
      canvas.dispatchEvent(new PointerEvent('pointerup'));
    }
  });

  function triggerAutoLock() {
    locked = true;
    AudioEngine.playLockIn();
    Visuals.setLocked(true);
    lockMsg.classList.add('visible');
    setTimeout(() => lockMsg.classList.remove('visible'), 2500);
    cycleLabel.textContent = 'Cycles: LOCKED';
    // Increase reverb for locked state
    AudioEngine.setReverbTail(0.7);
  }

  // Ambient breathing auto-pulse when idle
  let idleBreathInterval = null;
  function startIdleBreath() {
    if (idleBreathInterval) return;
    let phase = 0;
    let dir = 1;
    idleBreathInterval = setInterval(() => {
      if (isInhaling || locked) return;
      phase += 0.015 * dir;
      if (phase >= 1) { dir = -1; }
      if (phase <= 0) { dir = 1; }
      Visuals.updateBreathPhase(performance.now() / 1000, Math.abs(phase), dir);
      AudioEngine.setLowpassFrequency(400 + Math.abs(phase) * 600);
    }, 16);
  }
  startIdleBreath();

})();
</script>
</body>
