<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dragon's Breath — The Dragon Crew</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stars" aria-hidden="true"></div>

  <header>
    <h1>Dragon's Breath</h1>
    <p>A Dragon Crew Experience</p>
  </header>

  <button
    id="muteBtn"
    class="mute-btn"
    aria-label="Toggle sound"
    aria-pressed="false"
    title="Toggle sound"
  >
    <span id="muteIcon" aria-hidden="true">&#128266;</span>
  </button>

  <main class="stage" role="main">
    <div
      id="dragonArea"
      class="dragon-area"
      role="button"
      tabindex="0"
      aria-label="Hold to charge, release to breathe fire"
    >
      <!-- Dragon SVG -->
      <svg
        id="dragonSvg"
        class="dragon-svg"
        viewBox="0 0 400 400"
        xmlns="http://www.w3.org/2000/svg"
        aria-label="A stylized dragon"
      >
        <!-- Body -->
        <path
          class="dragon-body"
          d="M200,140 C170,140 145,155 135,175 C125,195 120,210 125,230
             C130,250 145,265 165,275 C185,285 200,290 200,290
             C200,290 215,285 235,275 C255,265 270,250 275,230
             C280,210 275,195 265,175 C255,155 230,140 200,140 Z"
        />
        <!-- Head -->
        <path
          class="dragon-head"
          d="M200,140 C190,120 180,100 185,85 C190,70 205,65 215,70
             C225,75 230,85 225,100 C220,115 210,130 200,140 Z"
        />
        <!-- Eyes -->
        <circle class="eye-eye" cx="195" cy="90" r="4" fill="#f0c040" />
        <circle class="eye-eye" cx="215" cy="90" r="4" fill="#f0c040" />
        <!-- Horns -->
        <path class="horn-horn" d="M188,82 L178,55 L192,75" />
        <path class="horn-horn" d="M218,82 L228,55 L214,75" />
        <!-- Mouth (hidden initially) -->
        <path
          id="mouth"
          class="dragon-mouth"
          d="M195,105 Q200,115 205,105"
          fill="none"
          stroke="#f0c040"
          stroke-width="1.5"
        />
        <!-- Wings -->
        <path class="wing-left" d="M140,190 C110,170 70,160 55,175 C70,170 100,185 130,200" />
        <path class="wing-right" d="M260,190 C290,170 330,160 345,175 C330,170 300,185 270,200" />
        <!-- Tail -->
        <path
          class="dragon-tail"
          d="M200,290 C200,300 210,320 220,335 C230,350 225,360 215,355 C205,350 200,340 195,330"
        />
        <!-- Belly glow (appears during charge) -->
        <circle id="bellyGlow" class="belly-glow" cx="200" cy="230" r="25" />
      </svg>

      <!-- Breath particles container -->
      <canvas id="particleCanvas" aria-hidden="true"></canvas>
    </div>

    <p id="statusText" class="status-text" aria-live="polite">Hold the dragon to charge</p>
    <div class="charge-meter" aria-hidden="true">
      <div id="chargeFill" class="charge-fill"></div>
    </div>
  </main>

  <footer>&copy; The Dragon Crew — Magical Experiences, Magical Creatures</footer>

  <script src="app.js"></script>
</body>
</html>
