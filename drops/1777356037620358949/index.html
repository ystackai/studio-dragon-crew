<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sanctuary</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:monospace}
#overlay{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:rgba(0,0,0,0.7);transition:opacity 1.2s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{color:#fff;font-size:2rem;letter-spacing:.4em;margin-bottom:.5rem;opacity:.85}
#overlay p{color:rgba(255,255,255,.62);font-size:.9rem;max-width:28rem;text-align:center;line-height:1.45}
#guide{position:fixed;left:50%;bottom:58px;transform:translateX(-50%);z-index:6;max-width:min(560px,calc(100vw - 32px));padding:9px 13px;border:1px solid rgba(255,255,255,.14);border-radius:999px;background:rgba(0,0,0,.42);color:rgba(255,255,255,.72);font-size:.72rem;line-height:1.35;text-align:center;pointer-events:none;transition:opacity 1.2s}
#guide.hidden{opacity:0}
#ui{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:95vw}
#ui button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);font-family:monospace;font-size:.65rem;padding:5px 10px;border-radius:3px;cursor:pointer;transition:all .2s}
#ui button.active{background:rgba(255,255,255,.18);color:#fff}
#phase{position:fixed;top:12px;right:14px;z-index:5;color:rgba(255,255,255,.35);font-size:.65rem;font-family:monospace;text-align:right;white-space:pre}
canvas{display:block;width:100%;height:100%;touch-action:none}
</style>
</head>
<body>
<div id="overlay"><h1>SANCTUARY</h1><p>Tap to start audio. Then hold or drag anywhere to breathe; use the element buttons to mute layers.</p></div>
<canvas id="c"></canvas>
<div id="phase"></div>
<div id="guide">Hold or drag to intensify the breath. Release to let the sanctuary exhale.</div>
<div id="ui">
<button data-layer="0" class="active">WATER</button>
<button data-layer="1" class="active">FIRE</button>
<button data-layer="2" class="active">SEA</button>
<button data-layer="3" class="active">LAVA</button>
<button data-layer="4" class="active">SNOW</button>
<button data-layer="5" class="active">ICE</button>
</div>
<script>
"use strict";

/* ===== CONSTANTS ===== */
const CYCLE = 12;

/* ===== STATE ===== */
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: true, alpha: false });
const phaseEl = document.getElementById('phase');
const overlay = document.getElementById('overlay');
const guide = document.getElementById('guide');

let audioCtx = null, masterGain = null, compressorNode = null;
let reverbNode = null, reverbGain = null;
let layerNodes = [];
let layerGains = [1, 1, 1, 1, 1, 1];
let breathValue = 0, inputPressure = 0, inputActive = false;
let cycleStart = 0;

/* ===== RESIZE ===== */
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = window.innerWidth * dpr;
  const h = window.innerHeight * dpr;
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
  }
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

/* ===== SMOOTHSTEP ===== */
function smoothstep(a, b, t) {
  const x = Math.max(0, Math.min(1, (t - a) / (b - a)));
  return x * x * (3 - 2 * x);
}

/* ===== BREATH PHASE ===== */
function getPhase(elapsed) {
  const p = ((elapsed % CYCLE) + CYCLE) % CYCLE;
  if (p < 4) return { breath: smoothstep(0, 4, p), name: 'INHALE' };
  if (p < 6) return { breath: 1, name: 'HOLD' };
  if (p < 10) return { breath: 1 - smoothstep(0, 4, p - 6), name: 'EXHALE' };
  return { breath: 0, name: 'RELEASE' };
}

/* ===== AUDIO ENGINE ===== */
const LAYER_DEFS = [
  { type: 'sine',      freqs: [130.81, 196.00, 261.63], vol: 0.08 },
  { type: 'sawtooth',  freqs: [174.61, 277.18],         vol: 0.04 },
  { type: 'sine',      freqs: [55.00, 82.41, 110.00],   vol: 0.10 },
  { type: 'square',    freqs: [100.00, 150.00, 200.00], vol: 0.03 },
  { type: 'sine',      freqs: [880.00, 1108.73, 1318.51],vol:0.03 },
  { type: 'sawtooth',  freqs: [220.00, 330.00, 440.00], vol: 0.04 },
];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  /* Compressor for clipping protection */
  compressorNode = audioCtx.createDynamicsCompressor();
  compressorNode.threshold.value = -3;
  compressorNode.knee.value = 6;
  compressorNode.ratio.value = 12;
  compressorNode.attack.value = 0.005;
  compressorNode.release.value = 0.15;
  compressorNode.connect(audioCtx.destination);

  /* Master gain */
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.55;
  masterGain.connect(compressorNode);

  /* Procedural reverb */
  reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0.25;
  const sr = audioCtx.sampleRate;
  const len = Math.floor(sr * 3.5);
  const buf = audioCtx.createBuffer(2, len, sr);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
    }
  }
  reverbNode = audioCtx.createConvolver();
  reverbNode.buffer = buf;
  reverbNode.connect(reverbGain);
  reverbGain.connect(masterGain);

  /* 6 elemental layers */
  LAYER_DEFS.forEach((def, idx) => {
    const g = audioCtx.createGain();
    g.gain.value = def.vol;
    const f = audioCtx.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.value = 2500;
    f.Q.value = 1;
    def.freqs.forEach(freq => {
      const o = audioCtx.createOscillator();
      o.type = def.type;
      o.frequency.value = freq;
      o.connect(g);
      o.start();
    });
    g.connect(f);
    f.connect(masterGain);
    f.connect(reverbNode);
    layerNodes.push({ gain: g, filter: f, vol: def.vol });
  });

  cycleStart = audioCtx.currentTime;
}

/* ===== SHADERS ===== */
const BG_VS = `#version 300 es
in vec2 aPos;
out vec2 vUV;
void main() {
  vUV = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}`;

const BG_FS = `#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;
uniform float uTime;
uniform float uBreath;
uniform float uPressure;
uniform vec2 uRes;

vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec4 mod289(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec4 permute(vec4 x) { return mod289((x * 34.0 + 1.0) * x); }

float hash12(vec2 p) {
  p = fract(p * vec2(233.34, 857.57));
  p += dot(p, p + vec2(23.456, 67.891));
  return fract(p.x * p.y * 43758.5453);
}

float noise3D(vec3 p) {
  vec3 a = floor(p);
  vec3 d = p - a;
  d = d * d * (3.0 - 2.0 * d);
  vec4 k1 = permute(a.xxyy + vec4(0.0, 1.0, 0.0, 1.0));
  vec4 k2 = permute(k1.xyxy + a.zzww * vec4(0.0, 0.0, 1.0, 1.0));
  vec4 c  = k2 + a.zzzz;
  vec4 k3 = permute(c);
  vec4 k4 = permute(c + 1.0);
  vec4 o1 = fract(k3 * (1.0/41.0));
  vec4 o2 = fract(k4 * (1.0/41.0));
  vec4 o3 = mix(o1, o2, d.z);
  vec2 o4 = mix(o3.xz, o3.yw, d.x);
  return mix(o4.x, o4.y, d.y);
}

float fbm3D(vec3 p) {
  float v = 0.0, a = 0.5;
  vec3 shift = vec3(100.0, 200.0, 300.0);
  for (int i = 0; i < 5; i++) {
    v += a * noise3D(p);
    p = p * 2.0 + shift;
    a *= 0.5;
   }
  return v;
}

void main() {
  vec2 uv = vUV;
  vec2 p = (gl_FragCoord.xy - uRes * 0.5) / min(uRes.x, uRes.y);

  /* Atmospheric gradient */
  vec3 bg = mix(vec3(0.015, 0.008, 0.055), vec3(0.008, 0.012, 0.035), uv.y);

  /* Volumetric light rays */
  float vol = noise3D(vec3(p * 2.5, uTime * 0.06));
  vol = smoothstep(0.35, 0.7, vol) * uBreath * 0.18;
  bg += vec3(0.12, 0.15, 0.3) * vol;

  /* Creature silhouettes from layered noise */
  float c1 = fbm3D(vec3(p * 4.5 + vec2(0.0, -0.25), uTime * 0.09 + 0.5));
  float c2 = fbm3D(vec3(p * 3.8 + vec2(0.15, 0.08), uTime * 0.11 + 1.3));
  float c3 = fbm3D(vec3(p * 3.2 + vec2(-0.1, 0.12), uTime * 0.07 + 2.7));
  float creature = max(max(c1, c2), c3);
  creature = smoothstep(0.32 + uBreath * 0.06, 0.48 + uBreath * 0.04, creature);
  float ca = creature * (0.08 + uBreath * 0.22);
  bg = mix(bg, vec3(0.04, 0.035, 0.08), ca);

   /* Hexagonal lattice grid */
  float hexGrid = 0.0;
  vec2 gridUV = gl_FragCoord.xy / 20.0;
  for (int y = -1; y <= 1; y++) {
    for (int x = -1; x <= 1; x++) {
      vec2 gv = gridUV + vec2(float(x), float(y) * 0.866);
      vec2 gf = fract(gv) - 0.5;
      float gDist = max(abs(gf.x), max(abs(gf.y), abs(gf.x + gf.y)));
      hexGrid += 1.0 - smoothstep(0.03, 0.06, abs(gDist - 0.45));
     }
   }
  hexGrid *= 0.1;
  vec3 hexCol = vec3(0.1, 0.14, 0.28) * (0.2 + uBreath * 0.8);
  bg += hexCol * hexGrid;

  /* Central resonance glow */
  float glow1 = smoothstep(0.2, 0.0, length(p));
  float glow2 = smoothstep(0.12, 0.0, length(p - vec2(sin(uTime * 0.25) * 0.04, cos(uTime * 0.3) * 0.04)));
  bg += vec3(0.2, 0.3, 0.55) * (glow1 + glow2 * 0.5) * uBreath * 0.35;

  /* Particle system */
  for (int i = 0; i < 32; i++) {
    float fi = float(i);
    float ph = fi * 2.41;
    float speed = 0.2 + fract(ph * 0.13) * 0.4;
    vec2 pp = vec2(
      sin(uTime * speed + ph) * (0.35 + uPressure * 0.25),
      cos(uTime * speed * 0.85 + ph * 0.6) * 0.3
    );
    float sz = 0.008 + uBreath * 0.012 * (0.5 + 0.5 * sin(fi * 1.618));
    float d = length(p - pp);
    float pt = smoothstep(sz, 0.0, d);
    vec3 pc = mix(vec3(0.35, 0.55, 0.95), vec3(1.0, 0.65, 0.2), fract(fi * 0.618));
    bg += pc * pt * (0.06 + uBreath * 0.18);
  }

  /* Vignette */
  float vig = 1.0 - smoothstep(0.4, 1.3, length(p * vec2(uRes.x / uRes.y, 1.0)));
  bg *= 0.3 + vig * 0.7;

  /* Chromatic aberration at high intensity */
  if (uBreath > 0.55) {
    float ca = (uBreath - 0.55) * 4.0;
    bg.r += uBreath * 0.015 * ca;
    bg.b -= uBreath * 0.01 * ca;
  }

  /* Reinhard tone mapping + slight gamma */
  bg = bg / (1.0 + bg);
  bg = pow(clamp(bg, 0.0, 1.0), vec3(0.9));

  fragColor = vec4(bg, 1.0);
}`;

/* ===== COMPILE HELPERS ===== */
function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function linkProgram(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(vs, gl.VERTEX_SHADER));
  gl.attachShader(p, compileShader(fs, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error('Link error:', gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

const prog = linkProgram(BG_VS, BG_FS);
const uTime     = gl.getUniformLocation(prog, 'uTime');
const uBreath   = gl.getUniformLocation(prog, 'uBreath');
const uPressure = gl.getUniformLocation(prog, 'uPressure');
const uRes      = gl.getUniformLocation(prog, 'uRes');
const aPos      = gl.getAttribLocation(prog, 'aPos');

/* Fullscreen quad buffer */
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

/* ===== INPUT ===== */
let mouseDown = false;

function pressureFromPos(mx, my) {
  const w = window.innerWidth, h = window.innerHeight;
  const dx = mx / w - 0.5, dy = my / h - 0.5;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return 0.25 + (1 - Math.min(dist * 2.828, 1)) * 0.75;
}

canvas.addEventListener('mousedown', e => { mouseDown = true; inputActive = true; inputPressure = pressureFromPos(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', e => { if (mouseDown) { inputPressure = pressureFromPos(e.clientX, e.clientY); if (guide) guide.classList.add('hidden'); } });
canvas.addEventListener('mouseup', () => { mouseDown = false; inputActive = false; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); inputActive = true; const t = e.touches[0]; inputPressure = pressureFromPos(t.clientX, t.clientY); if (guide) guide.classList.add('hidden'); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; inputPressure = pressureFromPos(t.clientX, t.clientY); if (guide) guide.classList.add('hidden'); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); inputActive = false; }, { passive: false });

/* Overlay click to init audio */
overlay.addEventListener('click', () => {
  overlay.classList.add('hidden');
  initAudio();
});

/* Layer toggle buttons */
document.querySelectorAll('#ui button').forEach(btn => {
  const idx = parseInt(btn.dataset.layer);
  btn.addEventListener('click', e => {
    e.stopPropagation();
    layerGains[idx] = layerGains[idx] > 0.5 ? 0 : 1;
    btn.classList.toggle('active', layerGains[idx] > 0.5);
    if (layerNodes[idx]) {
      layerNodes[idx].gain.gain.setTargetAtTime(layerNodes[idx].vol * layerGains[idx], audioCtx.currentTime, 0.04);
    }
  });
});

/* ===== RENDER LOOP ===== */
let prevTime = 0;

function loop(now) {
  requestAnimationFrame(loop);
  const t = now / 1000;
  const dt = Math.min(t - prevTime, 0.05);
  prevTime = t;

  /* Breath cycle */
  if (!cycleStart) cycleStart = t;
  const { breath, name } = getPhase(t - cycleStart);
  const progress = (((t - cycleStart) % CYCLE) + CYCLE) % CYCLE / CYCLE;

  /* Smooth pressure ramp */
  if (inputActive) {
    inputPressure += (Math.min(inputPressure + 0.08, 1) - inputPressure);
  } else {
    inputPressure = Math.max(0, inputPressure - dt * 2.5);
  }

  breathValue += ((breath * (0.5 + inputPressure * 0.5)) - breathValue) * Math.min(dt * 8, 1);

  /* Phase display */
  phaseEl.textContent = name + '\n' + Math.floor(progress * 100) + '%\nbreath: ' + breathValue.toFixed(2);

  /* Audio update */
  if (audioCtx && layerNodes.length) {
    const ff = 600 + breathValue * 4000 + inputPressure * 2000;
    const q  = 0.6 + breathValue * 2.5 + inputPressure * 4;
    const duck = 1 - inputPressure * 0.15;
    layerNodes.forEach((ln, i) => {
      ln.filter.frequency.setTargetAtTime(ff, audioCtx.currentTime, 0.02);
      ln.filter.Q.setTargetAtTime(q, audioCtx.currentTime, 0.02);
      const base = ln.vol * layerGains[i];
      ln.gain.gain.setTargetAtTime(base * (0.4 + breathValue * 0.7 + inputPressure * 0.4) * duck, audioCtx.currentTime, 0.03);
    });
    masterGain.gain.setTargetAtTime(0.55 * duck, audioCtx.currentTime, 0.04);
  }

  /* WebGL render */
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(prog);
  gl.uniform1f(uTime, t);
  gl.uniform1f(uBreath, breathValue);
  gl.uniform1f(uPressure, inputPressure);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
