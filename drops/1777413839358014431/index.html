<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sanctuary — The Dragon Crew</title>
  <meta name="description" content="A procedural audiovisual experience by The Dragon Crew">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="sanctuary" aria-label="Interactive sanctuary canvas" role="img"></canvas>
  <div id="ui-layer">
    <header id="title-bar">
      <h1 id="title">Sanctuary</h1>
      <p id="tagline">The Dragon Crew</p>
    </header>
    <div id="breath-indicator" role="progressbar" aria-label="Breath progress" aria-valuemin="0" aria-valuemax="100">
      <div class="bar-fill"></div>
    </div>
    <button id="mute-btn" class="icon-btn" aria-label="Toggle mute">
      <svg class="icon-sound" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.47 4.47 0 002.5-3.5z"/>
        <path fill="currentColor" d="M14 3.23v2.06a7 7 0 010 12.42v2.06A9 9 0 0014 3.23zM16.5 6.53v1.64a4.99 4.99 0 010 7.66v1.64A7 7 0 0016.5 6.53z"/>
      </svg>
      <svg class="icon-mute" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm14.6 5.3L19.7 11 21 12.3 17.6 16l-1.4-1.4zm-2.8-2.8L12 14l1.4 1.4L15.8 14 14.4 12.7z"/>
      </svg>
    </button>
  </div>
  <script src="game.js"></script>
</body>
</html>
