<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Dragon Crew</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0a14;
      --bg-mid: #14142a;
      --egg-base: #c8462a;
      --egg-dark: #7a2a18;
      --egg-light: #f09060;
      --accent-gold: #f5c842;
      --accent-fire: #ff6b35;
      --dragon-green: #3ecf8e;
      --dragon-dark: #1a6b4a;
      --text-primary: #f0ece4;
      --text-secondary: #8a8698;
      --glow-core: rgba(245, 200, 66, 0.3);
    }

    body {
      background: var(--bg-deep);
      background-image:
        radial-gradient(ellipse at 50% 60%, rgba(20, 20, 42, 0.8) 0%, var(--bg-deep) 70%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    h1 {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent-gold);
      text-shadow: 0 0 20px var(--glow-core);
      margin-bottom: 0.3em;
      transition: opacity 0.5s ease;
    }

    .subtitle {
      font-size: clamp(0.75rem, 1.8vw, 0.95rem);
      color: var(--text-secondary);
      margin-bottom: 2.5em;
      transition: opacity 0.5s ease;
    }

    .stage {
      width: clamp(160px, 30vw, 260px);
      height: clamp(200px, 38vw, 320px);
      position: relative;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .egg {
      width: 70%;
      height: 85%;
      background: radial-gradient(ellipse at 40% 35%, var(--egg-light), var(--egg-base) 50%, var(--egg-dark));
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      position: relative;
      box-shadow:
        0 0 30px rgba(200, 70, 42, 0.2),
        0 0 60px rgba(200, 70, 42, 0.1),
        inset 0 -20px 40px rgba(0, 0, 0, 0.3),
        inset 0 10px 30px rgba(240, 144, 96, 0.15);
      transition: transform 0.3s ease;
    }

    .egg::before {
      content: '';
      position: absolute;
      top: 12%;
      left: 22%;
      width: 18%;
      height: 12%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.25), transparent);
      border-radius: 50%;
    }

    .egg-band {
      position: absolute;
      width: 110%;
      height: 6px;
      left: -5%;
      border-radius: 3px;
      opacity: 0.6;
    }
    .egg-band:nth-child(1) { top: 28%; background: var(--egg-dark); }
    .egg-band:nth-child(2) { top: 50%; background: rgba(122, 42, 24, 0.7); }
    .egg-band:nth-child(3) { top: 72%; background: var(--egg-dark); }

    .egg.shaking {
      animation: shake 0.12s ease-in-out infinite alternate;
    }

    @keyframes shake {
      0% { transform: rotate(-4deg) translateX(-3px); }
      25% { transform: rotate(3.5deg) translateX(3px); }
      50% { transform: rotate(-3deg) translateX(-2px); }
      75% { transform: rotate(3deg) translateX(2px); }
      100% { transform: rotate(-2deg) translateX(-1px); }
    }

    .crack-lines {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .crack-lines.visible { opacity: 1; }

    .crack-line {
      position: absolute;
      background: rgba(10, 10, 20, 0.85);
      border-radius: 1px;
    }

    .crack-line:nth-child(1) { width: 2px; height: 35%; top: 30%; left: 45%; transform: rotate(15deg); }
    .crack-line:nth-child(2) { width: 2px; height: 20%; top: 35%; left: 44%; transform: rotate(-35deg); }
    .crack-line:nth-child(3) { width: 2px; height: 15%; top: 48%; left: 46%; transform: rotate(25deg); }
    .crack-line:nth-child(4) { width: 2px; height: 12%; top: 42%; left: 48%; transform: rotate(-20deg); }
    .crack-line:nth-child(5) { width: 2px; height: 25%; top: 52%; left: 47%; transform: rotate(10deg); }

    .glow-pulse {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      opacity: 0;
      pointer-events: none;
    }

    .egg.shaking .glow-pulse {
      animation: glow 0.3s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 20px var(--glow-core); opacity: 0.3; }
      to { box-shadow: 0 0 50px rgba(245, 200, 66, 0.5); opacity: 0.6; }
    }

    .stage.hatching .egg {
      animation: hatchEgg 0.6s ease-in forwards;
    }

    @keyframes hatchEgg {
      0% { transform: scale(1); opacity: 1; }
      30% { transform: scale(1.08) rotate(-5deg); opacity: 1; }
      60% { transform: scale(1.12) rotate(5deg); opacity: 0.7; }
      100% { transform: scale(0.3); opacity: 0; }
    }

    .dragon-container {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      pointer-events: none;
    }

    .stage.hatched .dragon-container {
      opacity: 1;
      pointer-events: auto;
    }

    .dragon-container svg {
      width: clamp(120px, 24vw, 200px);
      height: auto;
      filter: drop-shadow(0 0 25px rgba(62, 207, 142, 0.4));
    }

    .dragon-name {
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: var(--dragon-green);
      margin-top: 0.5em;
      text-shadow: 0 0 15px rgba(62, 207, 142, 0.4);
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .dragon-container.visible {
      animation: dragonReveal 0.8s ease-out forwards;
    }

    @keyframes dragonReveal {
      0% { opacity: 0; transform: scale(0.3) translateY(20px); }
      40% { opacity: 1; transform: scale(1.15) translateY(-8px); }
      70% { transform: scale(0.95) translateY(3px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .progress-ring {
      position: absolute;
      width: 110%;
      height: 110%;
      top: -5%;
      left: -5%;
      pointer-events: none;
    }

    .progress-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .progress-ring circle {
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .progress-track { stroke: rgba(245, 200, 66, 0.12); }
    .progress-fill {
      stroke: var(--accent-gold);
      stroke-dasharray: 691;
      stroke-dashoffset: 691;
      transition: stroke-dashoffset 0.25s ease;
      filter: drop-shadow(0 0 4px rgba(245, 200, 66, 0.4));
    }

    .click-count {
      font-size: clamp(0.7rem, 1.5vw, 0.85rem);
      color: var(--accent-gold);
      margin-top: 1.8em;
      letter-spacing: 0.05em;
      opacity: 0.8;
    }

    .controls {
      display: flex;
      gap: 1em;
      margin-top: 2.5em;
      align-items: center;
    }

    .btn {
      background: none;
      border: 1px solid rgba(240, 236, 228, 0.15);
      color: var(--text-secondary);
      padding: 0.5em 1.2em;
      border-radius: 6px;
      font-size: clamp(0.7rem, 1.5vw, 0.85rem);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      letter-spacing: 0.05em;
    }

    .btn:hover {
      border-color: rgba(240, 236, 228, 0.35);
      color: var(--text-primary);
      background: rgba(240, 236, 228, 0.05);
    }

    .btn:active { transform: scale(0.97); }

    .btn-summon {
      display: none;
      border-color: rgba(62, 207, 142, 0.3);
      color: var(--dragon-green);
    }

    .stage.hatched .btn-summon { display: inline-block; }
    .stage.hatched .btn-mute ~ .click-count { display: none; }

    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent-gold);
      opacity: 0;
      pointer-events: none;
    }

    .particle.active {
      animation: particleFly 0.6s ease-out forwards;
    }

    @keyframes particleFly {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
    }

    .spark-burst {
      position: absolute;
      width: 60%;
      height: 60%;
      top: 20%;
      left: 20%;
      pointer-events: none;
      opacity: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245, 200, 66, 0.4), transparent 70%);
    }

    .spark-burst.active {
      animation: sparkBurst 0.5s ease-out forwards;
    }

    @keyframes sparkBurst {
      0% { opacity: 0.8; transform: scale(0.5); }
      100% { opacity: 0; transform: scale(2.5); }
    }

    .ember-bg {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .ember {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent-fire);
      opacity: 0;
      animation: emberFloat var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    @keyframes emberFloat {
      0% { opacity: 0; transform: translateY(100vh) translateX(0); }
      20% { opacity: 0.6; }
      80% { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-10vh) translateX(var(--drift)); }
    }

    .ember.bright { background: var(--accent-gold); }

    @media (max-width: 400px) {
      h1 { letter-spacing: 0.1em; }
      .stage { width: 150px; height: 200px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="ember-bg" id="emberBg"></div>

  <div class="screen">
    <h1 id="title">The Dragon Crew</h1>
    <p class="subtitle" id="subtitle">Tap the egg to awaken it</p>

    <div class="stage" id="stage" role="button" aria-label="Tap to hatch the dragon egg" tabindex="0">
      <div class="progress-ring" id="progressRing">
        <svg viewBox="0 0 240 240">
          <circle class="progress-track" cx="120" cy="120" r="110"/>
          <circle class="progress-fill" id="progressFill" cx="120" cy="120" r="110"/>
        </svg>
      </div>

      <div class="egg" id="egg">
        <div class="egg-band"></div>
        <div class="egg-band"></div>
        <div class="egg-band"></div>
        <div class="crack-lines" id="crackLines">
          <div class="crack-line"></div>
          <div class="crack-line"></div>
          <div class="crack-line"></div>
          <div class="crack-line"></div>
          <div class="crack-line"></div>
        </div>
        <div class="glow-pulse"></div>
        <div class="spark-burst" id="sparkBurst"></div>
      </div>

      <div class="particles" id="particles"></div>

      <div class="dragon-container" id="dragonContainer">
        <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(100,110)">
            <ellipse cx="0" cy="10" rx="42" ry="52" fill="#3ecf8e" opacity="0.15"/>
            <path d="M0 -38 C-18 -38 -32 -22 -32 0 C-32 22 -20 40 0 48 C20 40 32 22 32 0 C32 -22 18 -38 0 -38Z" fill="#3ecf8e"/>
            <path d="M0 -32 C-14 -32 -24 -20 -24 0 C-24 18 -14 32 0 38 C14 32 24 18 24 0 C24 -20 14 -32 0 -32Z" fill="#4de8a4"/>
            <path d="M-8 -28 C-12 -24 -14 -18 -10 -15" stroke="#1a6b4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M8 -28 C12 -24 14 -18 10 -15" stroke="#1a6b4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <circle cx="-10" cy="-20" r="5" fill="#0a0a14"/>
            <circle cx="-10" cy="-20" r="3.5" fill="#f5c842"/>
            <circle cx="-9" cy="-21" r="1.2" fill="#f0ece4" opacity="0.6"/>
            <circle cx="10" cy="-20" r="5" fill="#0a0a14"/>
            <circle cx="10" cy="-20" r="3.5" fill="#f5c842"/>
            <circle cx="11" cy="-21" r="1.2" fill="#f0ece4" opacity="0.6"/>
            <path d="M-5 -10 Q0 -5 5 -10" stroke="#1a6b4a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
            <path d="M-18 -30 L-28 -45 L-16 -35Z" fill="#3ecf8e"/>
            <path d="M-28 -45 L-32 -40 L-26 -38Z" fill="#4de8a4"/>
            <path d="M18 -30 L28 -45 L16 -35Z" fill="#3ecf8e"/>
            <path d="M28 -45 L32 -40 L26 -38Z" fill="#4de8a4"/>
            <path d="M-20 15 C-35 5 -42 15 -38 25" stroke="#3ecf8e" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M20 15 C35 5 42 15 38 25" stroke="#3ecf8e" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M-6 52 C-20 60 -25 75 -18 85" stroke="#3ecf8e" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M6 52 C20 60 25 75 18 85" stroke="#3ecf8e" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M0 55 C-12 68 -16 80 -10 95" stroke="#4de8a4" stroke-width="3" fill="none" stroke-linecap="round"/>
            <path d="M-10 95 C-16 100 -8 105 -4 98 C0 92 -4 88 -10 95Z" fill="#f5c842" opacity="0.8"/>
            <ellipse cx="-40" cy="30" rx="4" ry="7" fill="#f5c842" opacity="0.25"/>
            <ellipse cx="40" cy="30" rx="4" ry="7" fill="#f5c842" opacity="0.25"/>
            <ellipse cx="-5" cy="55" rx="3" ry="6" fill="#f5c842" opacity="0.15"/>
            <ellipse cx="5" cy="55" rx="3" ry="6" fill="#f5c842" opacity="0.15"/>
          </g>
        </svg>
        <span class="dragon-name" id="dragonName">Emberling</span>
      </div>
    </div>

    <p class="click-count" id="clickCount">0 / 10</p>

    <div class="controls">
      <button class="btn btn-mute" id="btnMute" aria-label="Toggle sound">🔊 Mute</button>
      <button class="btn btn-summon" id="btnSummon" aria-label="Summon another dragon">Summon Again</button>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const TOTAL_CLICKS = 10;
      let clicks = 0;
      let isMuted = false;
      let audioCtx = null;
      let hatching = false;
      let hatched = false;

      const stage = document.getElementById('stage');
      const egg = document.getElementById('egg');
      const crackLines = document.getElementById('crackLines');
      const progressFill = document.getElementById('progressFill');
      const clickCount = document.getElementById('clickCount');
      const dragonContainer = document.getElementById('dragonContainer');
      const dragonName = document.getElementById('dragonName');
      const subtitle = document.getElementById('subtitle');
      const btnMute = document.getElementById('btnMute');
      const btnSummon = document.getElementById('btnSummon');
      const sparkBurst = document.getElementById('sparkBurst');
      const particlesContainer = document.getElementById('particles');
      const emberBg = document.getElementById('emberBg');

      const dragonNames = ['Emberling', 'Scaly', 'Puff', 'Cinder', 'Blaze', 'Spark', 'Flicker', 'Glow'];

      const CIRCUMFERENCE = 2 * Math.PI * 110;
      progressFill.style.strokeDasharray = CIRCUMFERENCE;
      progressFill.style.strokeDashoffset = CIRCUMFERENCE;

      function updateProgress() {
        const offset = CIRCUMFERENCE * (1 - clicks / TOTAL_CLICKS);
        progressFill.style.strokeDashoffset = offset;
        clickCount.textContent = clicks + ' / ' + TOTAL_CLICKS;
      }

      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
         }
      }

      function playShake() {
        if (!audioCtx || isMuted) return;
        try {
          const t = audioCtx.currentTime;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(120 + Math.random() * 40, t);
          osc.frequency.exponentialRampToValueAtTime(80, t + 0.15);
          gain.gain.setValueAtTime(0.15, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(t);
          osc.stop(t + 0.2);
        } catch (e) { /* silent */ }
      }

      function playCrack(intensity) {
        if (!audioCtx || isMuted) return;
        try {
          const t = audioCtx.currentTime;
          const bufferSize = audioCtx.sampleRate * 0.15;
          const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
          }
          const source = audioCtx.createBufferSource();
          source.buffer = buffer;
          const filter = audioCtx.createBiquadFilter();
          filter.type = 'bandpass';
          filter.frequency.value = 800 + intensity * 1200;
          filter.Q.value = 1.5;
          const gain = audioCtx.createGain();
          gain.gain.setValueAtTime(0.2 + intensity * 0.15, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
          source.connect(filter);
          filter.connect(gain);
          gain.connect(audioCtx.destination);
          source.start(t);
        } catch (e) { /* silent */ }
      }

      function playReveal() {
        if (!audioCtx || isMuted) return;
        try {
          const t = audioCtx.currentTime;
          const notes = [261.63, 329.63, 392, 523.25, 659.25];
          notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, t + i * 0.08);
            gain.gain.linearRampToValueAtTime(0.12, t + i * 0.08 + 0.04);
            gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.6);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(t + i * 0.08);
            osc.stop(t + i * 0.08 + 0.6);
          });
          const t2 = t + 0.35;
          const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
          const d = noiseBuf.getChannelData(0);
          for (let i = 0; i < d.length; i++) {
            d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3);
          }
          const nSrc = audioCtx.createBufferSource();
          nSrc.buffer = noiseBuf;
          const nf = audioCtx.createBiquadFilter();
          nf.type = 'highpass';
          nf.frequency.value = 3000;
          const ng = audioCtx.createGain();
          ng.gain.setValueAtTime(0.06, t2);
          ng.gain.exponentialRampToValueAtTime(0.001, t2 + 0.5);
          nSrc.connect(nf);
          nf.connect(ng);
          ng.connect(audioCtx.destination);
          nSrc.start(t2);
        } catch (e) { /* silent */ }
      }

      function spawnParticles(x, y, count) {
        for (let i = 0; i < count; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
          const dist = 40 + Math.random() * 60;
          p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
          p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
          p.style.left = '50%';
          p.style.top = '50%';
          p.style.background = Math.random() > 0.5 ? '#f5c842' : '#f09060';
          p.style.width = (3 + Math.random() * 3) + 'px';
          p.style.height = p.style.width;
          particlesContainer.appendChild(p);
          requestAnimationFrame(() => p.classList.add('active'));
          setTimeout(() => p.remove(), 700);
        }
      }

      function showSparkBurst() {
        sparkBurst.classList.remove('active');
        void sparkBurst.offsetWidth;
        sparkBurst.classList.add('active');
        setTimeout(() => sparkBurst.classList.remove('active'), 550);
      }

      function handleEggClick() {
        if (hatching || hatched) return;

        initAudio();
        clicks++;
        updateProgress();

        playShake();
        egg.classList.add('shaking');

        const intensity = clicks / TOTAL_CLICKS;
        playCrack(intensity);
        spawnParticles(0, 0, 3 + clicks);
        showSparkBurst();

        if (clicks >= 3) {
          crackLines.classList.add('visible');
        }

        setTimeout(() => {
          egg.classList.remove('shaking');
        }, 180 + clicks * 15);

        if (clicks >= TOTAL_CLICKS) {
          triggerHatch();
        } else {
          const msgs = ['...', 'It stirs...', 'Warmth builds...', 'Closer...', 'Almost...', 'A glow within...', 'Can you feel it?', 'The shell weakens...', 'One more time...'];
          subtitle.textContent = msgs[Math.min(clicks - 1, msgs.length - 1)];
        }
      }

      function triggerHatch() {
        hatching = true;
        stage.classList.add('hatching');
        subtitle.textContent = '';

        playCrack(1);

        setTimeout(() => {
          playReveal();
          stage.classList.remove('hatching');
          stage.classList.add('hatched');
          egg.style.display = 'none';
          dragonContainer.classList.add('visible');
          crackLines.classList.remove('visible');
          progressFill.style.strokeDashoffset = 0;
          document.getElementById('progressRing').style.display = 'none';

          const idx = Math.floor(Math.random() * dragonNames.length);
          dragonName.textContent = dragonNames[idx];
          subtitle.textContent = 'A new dragon awakens';

          const rect = stage.getBoundingClientRect();
          spawnParticles(rect.width / 2, rect.height / 2, 15);

          hatching = false;
          hatched = true;
        }, 650);
      }

      function resetState() {
        hatching = false;
        hatched = false;
        clicks = 0;
        egg.style.display = '';
        egg.classList.remove('shaking');
        crackLines.classList.remove('visible');
        dragonContainer.classList.remove('visible');
        stage.classList.remove('hatched', 'hatching');
        document.getElementById('progressRing').style.display = '';
        subtitle.textContent = 'Tap the egg to awaken it';
        updateProgress();
      }

      stage.addEventListener('click', handleEggClick);
      stage.addEventListener('touchend', (e) => {
        e.preventDefault();
        handleEggClick();
      });
      stage.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          handleEggClick();
        }
      });

      btnMute.addEventListener('click', () => {
        isMuted = !isMuted;
        btnMute.textContent = isMuted ? '🔇 Unmute' : '🔊 Mute';
        if (!isMuted) initAudio();
      });

      btnSummon.addEventListener('click', () => {
        resetState();
      });

      for (let i = 0; i < 18; i++) {
        const ember = document.createElement('div');
        ember.className = 'ember' + (Math.random() > 0.6 ? ' bright' : '');
        ember.style.left = (Math.random() * 100) + '%';
        ember.style.setProperty('--dur', (6 + Math.random() * 10) + 's');
        ember.style.setProperty('--delay', (Math.random() * 8) + 's');
        ember.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
        ember.style.width = (2 + Math.random() * 3) + 'px';
        ember.style.height = ember.style.width;
        emberBg.appendChild(ember);
      }

      updateProgress();
    })();
  </script>
</body>
</html>
