<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dragon Crew — Hatch Your Dragon</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08070f;
  --ember:#ff4e3a;
  --gold:#f0b232;
  --glow:rgba(255,78,58,.35);
  --egg:#2a2240;
  --egg-mid:#5a3f6e;
  --egg-light:#c8944d;
  --text:#e8dcc8;
  --dim:#7f7090;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 60%,rgba(90,63,110,.25),transparent),
    radial-gradient(ellipse 40% 40% at 55% 50%,rgba(255,78,58,.08),transparent);
  pointer-events:none;z-index:0;
}

#particles{
  position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;
}
.particle{
  position:absolute;
  width:3px;height:3px;
  border-radius:50%;
  background:var(--gold);
  opacity:0;
}

#audio-toggle{
  position:fixed;top:16px;right:16px;z-index:100;
  background:transparent;border:1px solid rgba(232,220,200,.2);
  color:var(--dim);cursor:pointer;
  padding:8px 14px;border-radius:6px;font-size:13px;
  transition:all .2s;
  font-family:inherit;
}
#audio-toggle:hover,#audio-toggle:focus-visible{
  border-color:var(--ember);color:var(--text);
  box-shadow:0 0 12px var(--glow);
}

.stage{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  gap:28px;
}

/* Sub-branding */
.brand{
  font-size:clamp(10px,1.4vw,12px);
  text-transform:uppercase;letter-spacing:.18em;
  color:var(--dim);
  margin-bottom:-16px;
  transition:opacity .5s;
}
.brand.hidden{opacity:0}

.title{
  font-size:clamp(22px,4.5vw,36px);
  font-weight:800;letter-spacing:.03em;
  text-transform:uppercase;
  color:var(--gold);
  text-shadow:0 0 24px rgba(240,178,50,.3), 0 2px 4px rgba(0,0,0,.6);
  transition:opacity .4s;
}
.title.hidden{opacity:0}

.instruction{
  font-size:clamp(13px,2vw,15px);
  color:var(--dim);
  transition:opacity .5s;
  user-select:none;
}
.instruction.hidden{opacity:0;pointer-events:none}

.egg-area{
  position:relative;
  width:clamp(140px,30vw,220px);
  height:clamp(180px,38vw,280px);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.egg-area:focus-visible{outline:2px solid var(--gold);outline-offset:8px;border-radius:40px}
.egg-area[aria-pressed='true']{cursor:grabbing}

.egg{
  position:absolute;inset:0;
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  background:
    radial-gradient(ellipse at 35% 30%,rgba(232,220,200,.15),transparent 50%),
    radial-gradient(ellipse at 60% 70%,rgba(255,78,58,.2),transparent 60%),
    linear-gradient(160deg,var(--egg-light) 0%,var(--egg-mid) 45%,var(--egg) 100%);
  box-shadow:
    inset -10px -10px 30px rgba(0,0,0,.5),
    inset 8px 8px 20px rgba(232,220,200,.08),
    0 0 40px rgba(90,63,110,.3),
    0 0 80px rgba(255,78,58,.1);
  transition:transform .15s,box-shadow .3s;
  will-change:transform;
}

.egg-area:hover .egg,
.egg-area:focus .egg{
  box-shadow:
    inset -10px -10px 30px rgba(0,0,0,.5),
    inset 8px 8px 20px rgba(232,220,200,.08),
    0 0 60px rgba(255,78,58,.4),
    0 0 100px rgba(255,78,58,.15);
}

.cracks{
  position:absolute;inset:0;
  pointer-events:none;
}
.crack-path{
  fill:none;stroke:var(--ember);stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;
  filter:drop-shadow(0 0 4px rgba(255,78,58,.6));
  stroke-dasharray:120;
  stroke-dashoffset:120;
  animation:drawCrack .4s ease-out forwards;
}
@keyframes drawCrack{to{stroke-dashoffset:0}}

.shake{animation:shake .25s ease-out}
@keyframes shake{
  0%,100%{transform:translate(0,0) rotate(0)}
  20%{transform:translate(-4px,2px) rotate(-1.5deg)}
  40%{transform:translate(3px,-2px) rotate(1deg)}
  60%{transform:translate(-2px,-1px) rotate(-1deg)}
  80%{transform:translate(2px,1px) rotate(.5deg)}
}

.progress{display:flex;gap:10px;align-items:center}
.dot{
  width:12px;height:12px;border-radius:50%;
  background:rgba(232,220,200,.12);
  border:1.5px solid rgba(232,220,200,.15);
  transition:all .3s;
}
.dot.lit{
  background:var(--ember);
  border-color:var(--gold);
  box-shadow:0 0 10px var(--glow);
}

.dragon{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .6s ease-in .1s;
}
.dragon.visible{opacity:1}
.dragon svg, .dragon .dragon-svg{
  width:clamp(100px,22vw,170px);
  filter:drop-shadow(0 0 20px rgba(240,178,50,.5));
}
.dragon.visible svg,
.dragon.visible .dragon-svg{
  animation: dragonBreathe 3s ease-in-out infinite;
}
@keyframes dragonBreathe{
  0%,100%{transform:scale(1) translateY(0)}
  50%{transform:scale(1.025) translateY(-4px)}
}

/* Fire breath animation */
.fire-breath{
  position:absolute;bottom:55%;left:50%;
  width:0;height:0;
  pointer-events:none;
  opacity:0;
  transition:opacity .3s;
}
.fire-breath.active{opacity:1}
.flame{
  position:absolute;
  border-radius:50%;
  background:radial-gradient(ellipse,var(--ember),rgba(255,78,58,0));
}

.shell-half{
  position:absolute;inset:0;
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  background:
    radial-gradient(ellipse at 35% 30%,rgba(232,220,200,.15),transparent 50%),
    linear-gradient(160deg,var(--egg-light) 0%,var(--egg-mid) 45%,var(--egg) 100%);
  transition:transform .8s cubic-bezier(.25,.6,.3,1), opacity .6s .3s;
}
.shell-left{ clip-path:inset(0 50% 0 0); }
.shell-right{ clip-path:inset(0 0 0 50%); }
.shell-left.open{transform:translateX(-70px) rotate(-25deg);opacity:0}
.shell-right.open{transform:translateX(70px) rotate(25deg);opacity:0}

.celebration{
  position:absolute;inset:-40px;pointer-events:none;
}
.spark{
  position:absolute;
  width:4px;height:4px;border-radius:50%;
  background:var(--gold);
  opacity:0;
}

.reset-btn{
  background:transparent;
  border:1.5px solid rgba(232,220,200,.2);
  color:var(--dim);
  padding:10px 22px;border-radius:8px;
  font-size:14px;cursor:pointer;
  transition:all .2s;
  opacity:0;pointer-events:none;
  font-family:inherit;
  text-transform:uppercase;
  letter-spacing:.08em;
}
.reset-btn.visible{opacity:1;pointer-events:auto}
.reset-btn:hover,.reset-btn:focus-visible{
  border-color:var(--ember);color:var(--text);
  box-shadow:0 0 12px var(--glow);
}

.hatch-msg{
  font-size:clamp(14px,2.5vw,18px);
  color:var(--gold);
  text-align:center;
  font-weight:600;
  letter-spacing:.04em;
  opacity:0;transition:opacity .5s ease-in .5s;
  text-shadow:0 0 16px rgba(240,178,50,.3);
}
.hatch-msg.visible{opacity:1}

.sr-only{
  position:absolute;width:1px;height:1px;
  padding:0;margin:-1px;overflow:hidden;
  clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

/* Glow ring around egg */
.glow-ring{
  position:absolute;inset:-20px;
  border-radius:50%;
  border:1px solid transparent;
  transition:border-color .5s, box-shadow .5s;
  pointer-events:none;
}
.glow-ring.crack-1{
  border-color:rgba(255,78,58,.15);
  box-shadow:0 0 30px rgba(255,78,58,.08);
}
.glow-ring.crack-2{
  border-color:rgba(255,78,58,.25);
  box-shadow:0 0 50px rgba(255,78,58,.12);
}
.glow-ring.crack-3{
  border-color:rgba(255,78,58,.4);
  box-shadow:0 0 70px rgba(255,78,58,.2);
  animation:pulseRing 1.5s ease-in-out infinite;
}
@keyframes pulseRing{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.06);opacity:.6}
}

/* Footer tagline */
.tagline{
  position:fixed;bottom:20px;
  font-size:clamp(10px,1.3vw,12px);
  color:rgba(127,112,144,.5);
  letter-spacing:.12em;text-transform:uppercase;
  text-align:center;
  transition:opacity 1s;
}
.tagline.hidden{opacity:0}
</style>
</head>
<body>

<div id="particles"></div>

<button id="audio-toggle" aria-label="Toggle sound on or off">Sound Off</button>

<div class="stage">
  <span class="brand" id="brand">The Dragon Crew</span>
  <h1 class="title" id="title">Hatch the Dragon</h1>
  <p class="instruction" id="instruction">Tap the egg to hatch your dragon</p>

  <div
    class="egg-area"
    id="egg-area"
    role="button"
    tabindex="0"
    aria-label="Dragon egg — tap to crack. Three taps to hatch."
    aria-pressed="false"
  >
    <div class="glow-ring" id="glow-ring"></div>
    <div class="shell-half shell-left" id="shell-left"></div>
    <div class="shell-half shell-right" id="shell-right"></div>
    <div class="egg" id="egg"></div>

    <svg class="cracks" id="cracks" viewBox="0 0 220 280" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>

    <div class="dragon" id="dragon" aria-hidden="true">
      <svg class="dragon-svg" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="60" cy="95" rx="28" ry="35" fill="#d47b25"/>
        <ellipse cx="60" cy="100" rx="16" ry="22" fill="#f0b232" opacity=".6"/>
        <ellipse cx="60" cy="38" rx="22" ry="20" fill="#d47b25"/>
        <ellipse cx="72" cy="44" rx="10" ry="7" fill="#c57020"/>
        <path d="M44 22 L36 6 L52 20" fill="#f0b232"/>
        <path d="M76 22 L84 6 L68 20" fill="#f0b232"/>
        <circle cx="52" cy="35" r="4" fill="#1a1020"/>
        <circle cx="52" cy="35" r="1.8" fill="#ffcc33"/>
        <circle cx="68" cy="35" r="4" fill="#1a1020"/>
        <circle cx="68" cy="35" r="1.8" fill="#ffcc33"/>
        <path d="M32 70 L8 50 L14 68 L4 78 L22 82 Z" fill="#b06018" opacity=".85"/>
        <path d="M88 70 L112 50 L106 68 L116 78 L98 82 Z" fill="#b06018" opacity=".85"/>
        <path d="M60 125 C70 135 85 130 90 118" stroke="#d47b25" stroke-width="6" stroke-linecap="round"/>
        <polygon points="90,114 96,118 90,122" fill="#f0b232"/>
        <circle cx="78" cy="42" r="1.5" fill="#ff7744" opacity=".5"/>
      </svg>
    </div>

    <div class="fire-breath" id="fire-breath" aria-hidden="true"></div>
    <div class="celebration" id="celebration" aria-hidden="true"></div>
  </div>

  <div class="progress" id="progress" aria-label="Hatching progress: 0 of 3" role="status">
    <span class="dot" id="dot-0"></span>
    <span class="dot" id="dot-1"></span>
    <span class="dot" id="dot-2"></span>
  </div>

  <p class="hatch-msg" id="hatch-msg">Your dragon has hatched!</p>
  <button class="reset-btn" id="reset-btn" aria-label="Hatch another dragon">Hatch Another</button>
</div>

<div class="tagline" id="tagline">We build Magical Experiences</div>

<div aria-live="polite" class="sr-only" id="sr-announcer"></div>

<script>
(function(){
  'use strict';

  /* State */
  var MAX_TAPS = 3;
  var crackCount = 0;
  var audioEnabled = false;
  var audioCtx = null;
  var isHatched = false;
  var cooldown = false;

  /* DOM refs */
  var eggArea     = document.getElementById('egg-area');
  var egg         = document.getElementById('egg');
  var cracks      = document.getElementById('cracks');
  var dragon      = document.getElementById('dragon');
  var celebration = document.getElementById('celebration');
  var title       = document.getElementById('title');
  var instruction = document.getElementById('instruction');
  var progress    = document.getElementById('progress');
  var hatchMsg    = document.getElementById('hatch-msg');
  var resetBtn    = document.getElementById('reset-btn');
  var srAnnounce  = document.getElementById('sr-announcer');
  var audioToggle = document.getElementById('audio-toggle');
  var shellLeft   = document.getElementById('shell-left');
  var shellRight  = document.getElementById('shell-right');
  var glowRing    = document.getElementById('glow-ring');
  var fireBreath  = document.getElementById('fire-breath');
  var brand       = document.getElementById('brand');
  var tagline     = document.getElementById('tagline');

  /* Audio Engine (Web Audio API, procedural) */
  function ensureAudioCtx(){
    if(!audioCtx){
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) {
        audioCtx = null;
        return;
      }
    }
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }

  /* noise buffer for crack sounds */
  var noiseBuffer = null;
  function getNoiseBuffer(ctx){
    if(!noiseBuffer){
      var len = ctx.sampleRate * 0.3;
      noiseBuffer = ctx.createBuffer(1, len, ctx.sampleRate);
      var d = noiseBuffer.getChannelData(0);
      for(var i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
    }
    return noiseBuffer;
  }

  /* Crack sound: short filtered noise + low thud */
  function playCrack(index){
    if(!audioEnabled || !audioCtx) return;
    var now = audioCtx.currentTime;
    var buf = getNoiseBuffer(audioCtx);
    var src = audioCtx.createBufferSource();
    src.buffer = buf;
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.setValueAtTime(600 + index * 400, now);
    bp.frequency.exponentialRampToValueAtTime(Math.max(200 + index * 300, 100), now + 0.15);
    bp.Q.value = 3;
    var gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.6 - index * 0.1, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    src.connect(bp).connect(gain).connect(audioCtx.destination);
    src.start(now);
    src.stop(now + 0.2);

    var osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(90 - index * 15, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.12);
    var g2 = audioCtx.createGain();
    g2.gain.setValueAtTime(0, now);
    g2.gain.linearRampToValueAtTime(0.35, now + 0.005);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.connect(g2).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.15);
  }

  /* Roar on hatch: layered sounds */
  function playRoar(){
    if(!audioEnabled || !audioCtx) return;
    var now = audioCtx.currentTime;
    var dur = 1.2;

    /* Low rumble */
    var osc1 = audioCtx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.setValueAtTime(60, now);
    osc1.frequency.linearRampToValueAtTime(120, now + 0.3);
    osc1.frequency.linearRampToValueAtTime(50, now + dur);
    var g1 = audioCtx.createGain();
    g1.gain.setValueAtTime(0.12, now);
    g1.gain.linearRampToValueAtTime(0.22, now + 0.3);
    g1.gain.linearRampToValueAtTime(0.001, now + dur);
    var lp1 = audioCtx.createBiquadFilter();
    lp1.type = 'lowpass'; lp1.frequency.value = 400;
    osc1.connect(lp1).connect(g1).connect(audioCtx.destination);
    osc1.start(now); osc1.stop(now + dur);

    /* Mid growl */
    var osc2 = audioCtx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(150, now);
    osc2.frequency.linearRampToValueAtTime(250, now + 0.15);
    osc2.frequency.linearRampToValueAtTime(100, now + dur * 0.8);
    var g2 = audioCtx.createGain();
    g2.gain.setValueAtTime(0.08, now);
    g2.gain.linearRampToValueAtTime(0.15, now + 0.15);
    g2.gain.linearRampToValueAtTime(0.001, now + dur * 0.7);
    var bp2 = audioCtx.createBiquadFilter();
    bp2.type = 'bandpass'; bp2.frequency.value = 600; bp2.Q.value = 2;
    osc2.connect(bp2).connect(g2).connect(audioCtx.destination);
    osc2.start(now); osc2.stop(now + dur);

    /* Noise burst */
    var buf = getNoiseBuffer(audioCtx);
    var src = audioCtx.createBufferSource();
    src.buffer = buf;
    var g3 = audioCtx.createGain();
    g3.gain.setValueAtTime(0, now);
    g3.gain.linearRampToValueAtTime(0.25, now + 0.05);
    g3.gain.linearRampToValueAtTime(0.001, now + 0.4);
    var lp3 = audioCtx.createBiquadFilter();
    lp3.type = 'lowpass'; lp3.frequency.value = 1200;
    src.connect(lp3).connect(g3).connect(audioCtx.destination);
    src.start(now); src.stop(now + 0.45);

    /* Ascending tone sweep */
    var osc3 = audioCtx.createOscillator();
    osc3.type = 'sine';
    osc3.frequency.setValueAtTime(300, now + 0.1);
    osc3.frequency.exponentialRampToValueAtTime(1800, now + dur * 0.5);
    osc3.frequency.exponentialRampToValueAtTime(400, now + dur);
    var g4 = audioCtx.createGain();
    g4.gain.setValueAtTime(0, now + 0.1);
    g4.gain.linearRampToValueAtTime(0.1, now + 0.4);
    g4.gain.linearRampToValueAtTime(0.001, now + dur);
    osc3.connect(g4).connect(audioCtx.destination);
    osc3.start(now + 0.1); osc3.stop(now + dur + 0.05);
  }

  /* Gentle chime for reset */
  function playChime(){
    if(!audioEnabled || !audioCtx) return;
    var now = audioCtx.currentTime;
    var notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach(function(freq, i) {
      var o = audioCtx.createOscillator();
      o.type = 'sine'; o.frequency.value = freq;
      var g = audioCtx.createGain();
      g.gain.setValueAtTime(0, now + i * 0.1);
      g.gain.linearRampToValueAtTime(0.08, now + i * 0.1 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.5);
      o.connect(g).connect(audioCtx.destination);
      o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.5);
    });
  }

  /* Tap sound (subtle, for audio toggle feedback) */
  function playTap(){
    if(!audioEnabled || !audioCtx) return;
    var now = audioCtx.currentTime;
    var o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.value = 200;
    o.frequency.exponentialRampToValueAtTime(80, now + 0.08);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.06, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    o.connect(g).connect(audioCtx.destination);
    o.start(now); o.stop(now + 0.1);
  }

  /* Visual feedback */

  /* SVG crack paths */
  var CRACK_PATHS = [
    'M110 140 L95 120 L108 95 L92 70',
    'M110 140 L125 115 L112 90 L128 65',
    'M110 140 C90 160 95 185 80 210 C70 200 85 190 75 175',
    'M110 140 C130 155 135 180 148 205 C158 195 145 185 152 170',
    'M100 145 L85 130 L90 110 L80 90',
    'M120 145 L135 128 L130 108 L140 88',
  ];

  function addCrackSVG(){
    var path = CRACK_PATHS[crackCount % CRACK_PATHS.length];
    if(crackCount > 0){
      var extra = CRACK_PATHS[(crackCount + 3) % CRACK_PATHS.length];
      var p2 = document.createElementNS('http://www.w3.org/2000/svg','path');
      p2.setAttribute('d', extra);
      p2.setAttribute('class','crack-path');
      p2.style.animationDelay = '0.08s';
      cracks.appendChild(p2);
    }
    var p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', path);
    p.setAttribute('class','crack-path');
    cracks.appendChild(p);
  }

  /* Celebration spark particles */
  function spawnSparks(count){
    for(var i = 0; i < count; i++){
      var s = document.createElement('div');
      s.className = 'spark';
      var cx = celebration.clientWidth ? celebration.clientWidth / 2 : 110;
      var cy = celebration.clientHeight ? celebration.clientHeight / 2 : 140;
      s.style.left = cx + 'px';
      s.style.top  = cy + 'px';
      var angle = Math.random() * Math.PI * 2;
      var dist  = 60 + Math.random() * 100;
      var dx = Math.cos(angle) * dist;
      var dy = Math.sin(angle) * dist;
      var dur = 0.4 + Math.random() * 0.6;
      s.style.background = Math.random() > 0.4 ? '#f0b232' : '#ffcc33';
      s.style.width  = (2 + Math.random() * 4) + 'px';
      s.style.height = s.style.width;
      celebration.appendChild(s);

      try {
        s.animate([
          {transform:'translate(0,0) scale(1)', opacity:1},
          {transform:'translate('+dx+'px,'+dy+'px) scale(0)', opacity:0},
        ],{
          duration: dur * 1000,
          easing: 'cubic-bezier(.2,.8,.3,1)',
          fill: 'forwards',
        }).onfinish = function(){ s.remove(); };
      } catch(e) {
        s.remove();
      }
    }
  }

  /* Fire breath effect */
  function spawnFireBreath(){
    fireBreath.classList.add('active');
    for(var i = 0; i < 12; i++){
      (function(i){
        var flame = document.createElement('div');
        flame.className = 'flame';
        var sz = 8 + Math.random() * 16;
        flame.style.width = sz + 'px';
        flame.style.height = sz + 'px';
        var dx = 30 + Math.random() * 60;
        var dy = -10 + (Math.random() - 0.5) * 30;
        flame.style.left = '0px';
        flame.style.top = '0px';
        fireBreath.appendChild(flame);

        try {
          flame.animate([
            {transform:'translate(0,0) scale(1)', opacity:0.8},
            {transform:'translate('+dx+'px,'+dy+'px) scale(0.2)', opacity:0},
          ],{
            duration: 800 + Math.random() * 600,
            delay: i * 80,
            easing: 'ease-out',
            fill: 'forwards',
          }).onfinish = function(){ flame.remove(); };
        } catch(e) {
          flame.remove();
        }
      })(i);
    }
    setTimeout(function(){
      fireBreath.classList.remove('active');
    }, 2000);
  }

  /* Shake the egg */
  function shakeEgg(){
    eggArea.classList.remove('shake');
    void eggArea.offsetWidth;
    eggArea.classList.add('shake');
  }

  /* Update progress dots */
  function updateProgress(){
    for(var i = 0; i < MAX_TAPS; i++){
      var dot = document.getElementById('dot-' + i);
      if(i < crackCount) dot.classList.add('lit');
    }
    progress.setAttribute('aria-label','Hatching progress: ' + crackCount + ' of ' + MAX_TAPS);
    if(crackCount > 0){
      srAnnounce.textContent = 'Crack ' + crackCount + ' of ' + MAX_TAPS;
    }
  }

  /* Update glow ring */
  function updateGlowRing(){
    glowRing.className = 'glow-ring';
    if(crackCount > 0) glowRing.classList.add('crack-' + crackCount);
  }

  /* Core interaction handler */
  function handleInteraction(){
    if(isHatched || cooldown) return;
    ensureAudioCtx();

    cooldown = true;
    eggArea.setAttribute('aria-pressed','true');

    crackCount++;
    playCrack(crackCount - 1);
    shakeEgg();

    setTimeout(function(){
      addCrackSVG();
      updateProgress();
      updateGlowRing();
    }, 80);

    /* Increase glow intensity */
    var glowScale = 1 + crackCount * 0.06;
    egg.style.transform = 'scale(' + glowScale + ')';
    egg.style.boxShadow = [
      'inset -10px -10px 30px rgba(0,0,0,.5)',
      'inset 8px 8px 20px rgba(232,220,200,.08)',
      '0 0 ' + (50 + crackCount * 30) + 'px rgba(255,78,58,' + (0.35 + crackCount * 0.15) + ')',
      '0 0 ' + (90 + crackCount * 30) + 'px rgba(255,78,58,' + (0.1 + crackCount * 0.08) + ')',
    ].join(',');

    /* Hatch on 3rd tap */
    if(crackCount >= MAX_TAPS){
      setTimeout(function(){ hatch(); }, 400);
    } else {
      setTimeout(function(){
        cooldown = false;
        eggArea.setAttribute('aria-pressed','false');
        egg.style.transform = 'scale(' + glowScale + ')';
      }, 250);
    }
  }

  /* Hatch sequence */
  function hatch(){
    isHatched = true;
    cooldown = false;
    eggArea.setAttribute('aria-pressed','false');

    playRoar();

    egg.style.transition = 'opacity 0.4s';
    egg.style.opacity = '0';

    shellLeft.classList.add('open');
    shellRight.classList.add('open');

    dragon.classList.add('visible');
    dragon.setAttribute('aria-hidden','false');

    title.classList.add('hidden');
    instruction.classList.add('hidden');
    brand.classList.add('hidden');

    setTimeout(function(){
      progress.style.opacity = '0';
      hatchMsg.classList.add('visible');
      resetBtn.classList.add('visible');
      spawnSparks(30);
      spawnFireBreath();
      setTimeout(function(){ spawnSparks(15); }, 300);
      srAnnounce.textContent = 'Congratulations! Your dragon has hatched.';
    }, 500);

    setTimeout(function(){
      cracks.style.display = 'none';
    }, 600);
  }

  /* Reset */
  function resetGame(){
    isHatched = false;
    crackCount = 0;
    cooldown = false;

    playChime();

    egg.style.transition = '';
    egg.style.opacity = '1';
    egg.style.transform = '';
    egg.style.boxShadow = '';

    shellLeft.classList.remove('open');
    shellRight.classList.remove('open');

    cracks.innerHTML = '';
    cracks.style.display = '';

    dragon.classList.remove('visible');
    dragon.setAttribute('aria-hidden','true');
    hatchMsg.classList.remove('visible');
    resetBtn.classList.remove('visible');
    title.classList.remove('hidden');
    instruction.classList.remove('hidden');
    brand.classList.remove('hidden');
    progress.style.opacity = '';
    progress.setAttribute('aria-label','Hatching progress: 0 of 3');
    glowRing.className = 'glow-ring';

    for(var i = 0; i < MAX_TAPS; i++){
      document.getElementById('dot-' + i).classList.remove('lit');
    }

    eggArea.setAttribute('aria-pressed','false');
    srAnnounce.textContent = 'Ready to hatch a new dragon.';
  }

  /* Audio toggle */
  function toggleAudio(){
    audioEnabled = !audioEnabled;
    audioToggle.textContent = audioEnabled ? 'Sound On' : 'Sound Off';
    audioToggle.setAttribute('aria-label', audioEnabled ? 'Sound is on — click to mute' : 'Sound is off — click to enable');
    if(audioEnabled){
      ensureAudioCtx();
      if(audioCtx) playTap();
    }
  }

  /* Ambient particles */
  function createAmbientParticles(){
    var container = document.getElementById('particles');
    for(var i = 0; i < 20; i++){
      (function(i){
        var p = document.createElement('div');
        p.className = 'particle';
        var x = Math.random() * 100;
        p.style.left = x + '%';
        p.style.bottom = '-10px';
        container.appendChild(p);

        var dur = 4000 + Math.random() * 6000;
        var drift = (Math.random() - 0.5) * 80;

        try {
          p.animate([
            {transform:'translate(0,0)', opacity:0},
            {transform:'translate('+(drift*0.3)+'px,-30vh)', opacity:0.6, offset:0.3},
            {transform:'translate('+drift+'px,-110vh)', opacity:0},
          ],{
            duration: dur,
            delay: Math.random() * dur * 0.5,
            iterations: Infinity,
            easing: 'ease-in-out',
          });
        } catch(e) {
          p.remove();
        }
      })(i);
    }
  }

  /* Binding */
  eggArea.addEventListener('click', handleInteraction);
  eggArea.addEventListener('keydown', function(e){
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      handleInteraction();
    }
  });
  resetBtn.addEventListener('click', resetGame);
  audioToggle.addEventListener('click', toggleAudio);

  /* Init */
  createAmbientParticles();

  /* Subtle idle pulse on the egg */
  try {
    egg.animate([
      {transform:'scale(1)'},
      {transform:'scale(1.015)'},
      {transform:'scale(1)'},
    ],{
      duration: 3000,
      iterations: Infinity,
      easing: 'ease-in-out',
    });
  } catch(e) {
    /* Web Animations API not supported */
  }

})();
</script>
</body>
</html>
