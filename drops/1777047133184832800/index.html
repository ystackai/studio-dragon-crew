<!doctype html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Rhythm Drift</title>
   <link rel="stylesheet" href="styles.css">
<style id="ystack-repair-hint-style">.ystack-repair-hint{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:9999;padding:6px 10px;border:1px solid rgba(255,255,255,.28);background:rgba(0,0,0,.66);color:rgba(255,255,255,.9);font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:0;border-radius:4px;pointer-events:none;max-width:min(92vw,520px);text-align:center}</style>
</head>
<body>
   <canvas id="gl-canvas"></canvas>
   <div id="hud">
      <div id="score-display">Flow: <span id="score-val">0.00</span></div>
      <div id="state-display">State: <span id="state-val">Active</span></div>
      <div id="cadence-display">Beat: <span id="beat-val">--</span>ms</div>
   </div>
   <script src="assets/textures.js"></script>
   <script src="shaders/twilight.js?v=runtime-repair-20260428b"></script>
   <script>
   window.createRippleProgram = function(gl) {
      const vsSrc = `#version 300 es
      in vec2 a_position;
      void main(){ gl_Position = vec4(a_position, 0.0, 1.0); }`;
      const fsSrc = `#version 300 es
      precision highp float;
      out vec4 fragColor;
      uniform float u_time;
      void main(){ float a = 0.12 + 0.08 * sin(u_time * 3.0); fragColor = vec4(0.25, 0.55, 0.9, a); }`;
      function sh(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        return s;
      }
      const prog = gl.createProgram();
      gl.attachShader(prog, sh(gl.VERTEX_SHADER, vsSrc));
      gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, fsSrc));
      gl.linkProgram(prog);
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
      return {
        program: prog,
        buffer: buf,
        loc: {
          aPosition: gl.getAttribLocation(prog, 'a_position'),
          uTime: gl.getUniformLocation(prog, 'u_time'),
          uResolution: null,
          uRippleCount: null,
          uRippleCenter: [],
          uRippleBirth: []
        },
        maxRipples: 0
      };
   };
   window.createCreatureProgram = function(gl) {
      const vsSrc = `#version 300 es
      precision highp float;
      layout(location = 0) in vec3 a_position;
      layout(location = 1) in vec2 a_uv;
      layout(location = 2) in vec3 a_normal;
      uniform mat4 u_mvp;
      void main(){ gl_Position = u_mvp * vec4(a_position, 0.0, 1.0); }`;
      const fsSrc = `#version 300 es
      precision highp float;
      out vec4 fragColor;
      uniform float u_time;
      void main(){ float p = 0.5 + 0.5 * sin(u_time * 2.5); fragColor = vec4(0.35 + p * 0.35, 0.45, 0.8, 1.0); }`;
      function sh(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        return s;
      }
      const prog = gl.createProgram();
      gl.attachShader(prog, sh(gl.VERTEX_SHADER, vsSrc));
      gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, fsSrc));
      gl.linkProgram(prog);
      const loc = {
        uModel: null,
        uMvp: gl.getUniformLocation(prog, 'u_mvp'),
        uNormalMat: null,
        uActiveBaseColor: null,
        uActiveEmissive: null,
        uActiveLuminosity: null,
        uActiveNormalTex: null,
        uDriftBaseColor: null,
        uDriftWarmTint: null,
        uDriftSSSStrength: null,
        uDriftGaussianSigma: null,
        uDriftDiffuseTex: null,
        uDriftFactor: null,
        uLightDir: null,
        uCameraPos: null,
        uTime: gl.getUniformLocation(prog, 'u_time')
      };
      return { program: prog, loc };
   };
   </script>
   <script src="game.js?v=runtime-repair-20260428"></script>
<div class="ystack-repair-hint">Click, tap, drag, or use the controls to interact.</div>
</body>
</html>
