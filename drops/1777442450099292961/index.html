<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dragon Crew</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ice: #7dd3fc;
  --lava: #f97316;
  --water: #38bdf8;
  --sea: #818cf8;
  --fire: #ef4444;
  --snow: #e0e7ff;
  --bg: #0c0a1a;
  --surface: #1a1630;
  --text: #f1f0f5;
  --muted: #7a7598;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}

header {
  text-align: center;
  margin-bottom: 2rem;
}

header h1 {
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--ice), var(--sea), var(--lava), var(--fire));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

header p {
  color: var(--muted);
  font-size: 0.95rem;
  margin-top: 0.4rem;
}

#stage {
  width: 100%;
  max-width: 700px;
  aspect-ratio: 16/9;
  border-radius: 16px;
  background: var(--surface);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 2rem;
  box-shadow: 0 0 60px rgba(100, 80, 180, 0.12);
}

#stage::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  box-shadow: inset 0 0 80px rgba(0,0,0,0.4);
  pointer-events: none;
  z-index: 1;
}

#stage canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

#stage-label {
  position: relative;
  z-index: 2;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--muted);
  pointer-events: none;
  transition: color 0.3s, text-shadow 0.3s;
  text-shadow: 0 0 8px rgba(0,0,0,0.6);
}

#stage-label.lit {
  color: var(--text);
  text-shadow: 0 0 20px rgba(129,140,248,0.4);
}

.dragons {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  justify-content: center;
  max-width: 700px;
  width: 100%;
}

.dragon-btn {
  flex: 1 1 calc(33% - 1rem);
  min-width: 140px;
  max-width: 220px;
  padding: 1rem 1.2rem;
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: all 0.18s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.dragon-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

.dragon-btn:active {
  transform: translateY(0);
  transition-duration: 0.06s;
}

.dragon-btn .emoji {
  font-size: 1.8rem;
  line-height: 1;
}

.dragon-btn .name {
  font-weight: 700;
  font-size: 0.9rem;
  letter-spacing: 0.01em;
}

.dragon-btn .tag {
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.dragon-btn.active {
  border-color: var(--btn-color);
  background: color-mix(in srgb, var(--btn-color) 15%, var(--surface));
  box-shadow: 0 0 30px color-mix(in srgb, var(--btn-color) 30%, transparent);
}

.dragon-btn.awakened {
  border-color: color-mix(in srgb, var(--btn-color) 40%, rgba(255,255,255,0.15));
}

#ice-btn { --btn-color: var(--ice); }
#lava-btn { --btn-color: var(--lava); }
#water-btn { --btn-color: var(--water); }
#sea-btn { --btn-color: var(--sea); }
#fire-btn { --btn-color: var(--fire); }
#snow-btn { --btn-color: var(--snow); }

#controls {
  margin-top: 1.8rem;
  display: flex;
  gap: 0.8rem;
  align-items: center;
}

.ctrl-btn {
  padding: 0.6rem 1.4rem;
  border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.1);
  background: var(--surface);
  color: var(--text);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s ease;
}

.ctrl-btn:hover {
  border-color: rgba(255,255,255,0.25);
}

.ctrl-btn.muted {
  opacity: 0.5;
}

#combo-display {
  margin-top: 1rem;
  font-size: 0.85rem;
  color: var(--muted);
  height: 1.2em;
  transition: color 0.3s;
}

#combo-display.lit {
  color: var(--text);
}

#progress-bar {
  width: 100%;
  max-width: 400px;
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  margin-top: 0.8rem;
  overflow: hidden;
}

#progress-fill {
  height: 100%;
  width: 0%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--ice), var(--sea), var(--lava), var(--fire));
  transition: width 0.4s ease;
}

@media (max-width: 500px) {
  .dragon-btn {
    flex: 1 1 calc(50% - 0.5rem);
    min-width: 110px;
    padding: 0.8rem;
  }
  .dragon-btn .emoji { font-size: 1.5rem; }
}
</style>
</head>
<body>

<header>
  <h1>The Dragon Crew</h1>
  <p>Trigger the crew — each dragon has a voice</p>
</header>

<div id="stage">
  <canvas id="canvas"></canvas>
  <span id="stage-label">Tap a dragon to begin</span>
</div>

<div class="dragons" role="group" aria-label="Dragons">
  <button class="dragon-btn" id="ice-btn" data-dragon="ice" aria-label="Ice Dragon">
    <span class="emoji">🧊</span>
    <span class="name">Ice Dragon</span>
    <span class="tag">Crystal</span>
  </button>
  <button class="dragon-btn" id="lava-btn" data-dragon="lava" aria-label="Lava Dragon">
    <span class="emoji">🔥</span>
    <span class="name">Lava Dragon</span>
    <span class="tag">Ember</span>
  </button>
  <button class="dragon-btn" id="water-btn" data-dragon="water" aria-label="Water Dragon">
    <span class="emoji">🌊</span>
    <span class="name">Water Dragon</span>
    <span class="tag">Flow</span>
  </button>
  <button class="dragon-btn" id="sea-btn" data-dragon="sea" aria-label="Sea Dragon">
    <span class="emoji">🌊</span>
    <span class="name">Sea Dragon</span>
    <span class="tag">Pearl</span>
  </button>
  <button class="dragon-btn" id="fire-btn" data-dragon="fire" aria-label="Fire Dragon">
    <span class="emoji">🔥</span>
    <span class="name">Fire Dragon</span>
    <span class="tag">Blaze</span>
  </button>
  <button class="dragon-btn" id="snow-btn" data-dragon="snow" aria-label="Snow Dragon">
    <span class="emoji">❄️</span>
    <span class="name">Snow Dragon</span>
    <span class="tag">Shimmer</span>
  </button>
</div>

<div id="controls">
  <button class="ctrl-btn" id="mute-btn" aria-label="Toggle sound">🔊 Sound</button>
  <button class="ctrl-btn" id="harmony-btn">🎵 Harmony</button>
  <button class="ctrl-btn" id="reset-btn" style="display:none;">↻ Reset</button>
</div>

<div id="combo-display" aria-live="polite"></div>
<div id="progress-bar"><div id="progress-fill"></div></div>

<script>
// ─── Audio Engine ─────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let masterGain = null;
let isMuted = false;
let harmonyMode = false;

function ensureAudioContext() {
  if (!audioCtx) {
    audioCtx = new AudioCtx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = isMuted ? 0 : 0.7;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function toggleMute() {
  isMuted = !isMuted;
  if (masterGain) masterGain.gain.value = isMuted ? 0 : 0.7;
  const btn = document.getElementById('mute-btn');
  btn.textContent = isMuted ? '🔇 Muted' : '🔊 Sound';
  btn.classList.toggle('muted', isMuted);
}

const DRAGON_SCALES = {
  ice:    { freqs: [1046.5, 1174.7, 1318.5, 1568.0, 1760.0], color: '#7dd3fc' },
  lava:   { freqs: [130.8, 155.6, 174.6, 196.0, 233.1],       color: '#f97316' },
  water:  { freqs: [523.3, 587.3, 659.3, 784.0, 880.0],          color: '#38bdf8' },
  sea:    { freqs: [261.6, 293.7, 329.6, 392.0, 440.0],          color: '#818cf8' },
  fire:   { freqs: [698.5, 784.0, 880.0, 1046.5, 1174.7],        color: '#ef4444' },
  snow:   { freqs: [1568.0, 1760.0, 1975.5, 2349.0, 2637.0],     color: '#e0e7ff' },
};

const HARMONY_PROGRESSION = [0, 2, 4, 1, 3, 2];

function playSine(freq, duration, startTime, gainVal = 0.3, target = null) {
  const osc = audioCtx.createOscillator();
  const env = audioCtx.createGain();
  const dst = target || masterGain;
  osc.type = 'sine';
  osc.frequency.value = freq;
  env.gain.setValueAtTime(0.001, startTime);
  env.gain.linearRampToValueAtTime(gainVal, startTime + 0.04);
  env.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(env);
  env.connect(dst);
  osc.start(startTime);
  osc.stop(startTime + duration);
  return { osc, env };
}

function playNoise(duration, startTime, gainVal = 0.15, filterType = 'bandpass') {
  const sr = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, sr * duration, sr);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const env = audioCtx.createGain();
  const filt = audioCtx.createBiquadFilter();
  filt.type = filterType;
  filt.Q.value = 1.2;
  filt.frequency.value = 800;
  env.gain.setValueAtTime(0.001, startTime);
  env.gain.linearRampToValueAtTime(gainVal, startTime + 0.02);
  env.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  src.connect(filt);
  filt.connect(env);
  env.connect(masterGain);
  src.start(startTime);
  src.stop(startTime + duration);
  return { src, env, filt };
}

function playDragonSound(dragon) {
  ensureAudioContext();
  const t = audioCtx.currentTime;
  const scale = DRAGON_SCALES[dragon];
  if (!scale) return;

  const idx = Math.floor(Math.random() * scale.freqs.length);
  const baseFreq = scale.freqs[idx];

  switch (dragon) {
    case 'ice': {
      playSine(baseFreq * 4, 0.8, t, 0.15);
      playSine(baseFreq * 6, 0.6, t + 0.05, 0.08);
      playSine(baseFreq * 3, 0.5, t + 0.1, 0.1);
      const sparkleIdx = (idx + 2) % scale.freqs.length;
      playSine(scale.freqs[sparkleIdx] * 4, 0.3, t + 0.15, 0.06);
      break;
    }
    case 'lava': {
      playSine(baseFreq, 1.2, t, 0.35);
      playSine(baseFreq * 0.5, 1.5, t, 0.2);
      playNoise(0.6, t + 0.1, 0.1, 'bandpass');
      playSine(baseFreq * 1.5, 0.8, t + 0.15, 0.12);
      break;
    }
    case 'water': {
      playSine(baseFreq, 0.7, t, 0.2);
      playSine(baseFreq * 1.5, 0.5, t + 0.1, 0.15);
      const sweep = audioCtx.createOscillator();
      const sweepEnv = audioCtx.createGain();
      sweep.type = 'sine';
      sweep.frequency.setValueAtTime(baseFreq, t);
      sweep.frequency.exponentialRampToValueAtTime(baseFreq * 2, t + 0.5);
      sweepEnv.gain.setValueAtTime(0.001, t);
      sweepEnv.gain.linearRampToValueAtTime(0.12, t + 0.05);
      sweepEnv.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      sweep.connect(sweepEnv);
      sweepEnv.connect(masterGain);
      sweep.start(t);
      sweep.stop(t + 0.7);
      break;
    }
    case 'sea': {
      playSine(baseFreq, 1.0, t, 0.25);
      playSine(baseFreq * 2, 0.8, t + 0.1, 0.15);
      playSine(baseFreq * 3, 0.6, t + 0.2, 0.08);
      const tidalFilt = audioCtx.createBiquadFilter();
      tidalFilt.type = 'lowpass';
      tidalFilt.frequency.value = 400;
      const tidalSrc = audioCtx.createBufferSource();
      const tidalDur = 1.0;
      const tidalBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * tidalDur, audioCtx.sampleRate);
      const tidalData = tidalBuf.getChannelData(0);
      for (let i = 0; i < tidalData.length; i++) tidalData[i] = Math.random() * 2 - 1;
      tidalSrc.buffer = tidalBuf;
      const tidalEnv = audioCtx.createGain();
      tidalEnv.gain.setValueAtTime(0.001, t);
      tidalEnv.gain.linearRampToValueAtTime(0.08, t + 0.15);
      tidalEnv.gain.setValueAtTime(0.08, t + 0.5);
      tidalEnv.gain.exponentialRampToValueAtTime(0.001, t + tidalDur);
      tidalSrc.connect(tidalFilt);
      tidalFilt.connect(tidalEnv);
      tidalEnv.connect(masterGain);
      tidalSrc.start(t);
      tidalSrc.stop(t + tidalDur);
      break;
    }
    case 'fire': {
      playSine(baseFreq * 2, 0.4, t, 0.2);
      playSine(baseFreq * 3, 0.3, t + 0.05, 0.12);
      playNoise(0.3, t, 0.18, 'bandpass');
      const whoosh = audioCtx.createOscillator();
      const whooshEnv = audioCtx.createGain();
      whoosh.type = 'sawtooth';
      whoosh.frequency.setValueAtTime(baseFreq * 4, t + 0.15);
      whoosh.frequency.exponentialRampToValueAtTime(baseFreq, t + 0.6);
      whooshEnv.gain.setValueAtTime(0.08, t + 0.15);
      whooshEnv.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      const whooshFilt = audioCtx.createBiquadFilter();
      whooshFilt.type = 'lowpass';
      whooshFilt.frequency.value = 1200;
      whoosh.connect(whooshFilt);
      whooshFilt.connect(whooshEnv);
      whooshEnv.connect(masterGain);
      whoosh.start(t + 0.15);
      whoosh.stop(t + 0.6);
      break;
    }
    case 'snow': {
      playSine(baseFreq, 1.5, t, 0.08);
      playSine(baseFreq * 1.5, 1.2, t + 0.05, 0.06);
      playSine(baseFreq * 2, 1.0, t + 0.15, 0.05);
      const a = audioCtx.createOscillator();
      const b = audioCtx.createOscillator();
      a.type = 'sine'; b.type = 'sine';
      a.frequency.value = baseFreq * 3;
      b.frequency.value = baseFreq * 3 * 1.008;
      const aEnv = audioCtx.createGain();
      const bEnv = audioCtx.createGain();
      [aEnv, bEnv].forEach(e => {
        e.gain.setValueAtTime(0.001, t);
        e.gain.linearRampToValueAtTime(0.04, t + 0.1);
        e.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
      });
      a.connect(aEnv); b.connect(bEnv);
      aEnv.connect(masterGain); bEnv.connect(masterGain);
      a.start(t); b.start(t);
      a.stop(t + 1.2); b.stop(t + 1.2);
      break;
    }
  }

  if (harmonyMode) {
    const progIdx = HARMONY_PROGRESSION[(lastDragon || 0) % 6];
    const chordFreqs = scale.freqs.slice(0, 3);
    chordFreqs.forEach((f, i) => {
      playSine(f * (i === 0 ? 1 : (i === 1 ? 1.5 : 2)), 0.9, t + i * 0.08, 0.06);
    });
  }
}

function playCompletionChord() {
  ensureAudioContext();
  const t = audioCtx.currentTime;
  const notes = [261.6, 329.6, 392.0, 493.9];
  notes.forEach((f, i) => playSine(f, 2.5, t + i * 0.06, 0.14));
  notes.forEach((f, i) => playSine(f * 2, 2.0, t + i * 0.06 + 0.1, 0.07));
  notes.forEach((f, i) => playSine(f * 0.5, 2.8, t + i * 0.06, 0.1));
  playNoise(2.0, t, 0.03, 'lowpass');
  // Arpeggio tail
  [523.3, 659.3, 784.0, 1046.5].forEach((f, i) => {
    playSine(f, 1.2, t + 0.5 + i * 0.12, 0.08);
  });
}

function playResetSound() {
  ensureAudioContext();
  const t = audioCtx.currentTime;
  playSine(440, 0.12, t, 0.1);
  playSine(330, 0.12, t + 0.04, 0.1);
  playSine(220, 0.18, t + 0.08, 0.08);
}

// ─── Visuals ────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let ambientOrbs = [];
let celebrationBursts = [];
let rafId = null;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  // Re-init ambient orbs
  initAmbientOrbs();
}
window.addEventListener('resize', resizeCanvas);

function initAmbientOrbs() {
  ambientOrbs = [];
  const rect = canvas.parentElement.getBoundingClientRect();
  const count = 24;
  for (let i = 0; i < count; i++) {
    ambientOrbs.push({
      x: Math.random() * rect.width,
      y: Math.random() * rect.height,
      r: 1 + Math.random() * 2.5,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 8,
      phase: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.7,
      color: Object.values(DRAGON_SCALES)[Math.floor(Math.random() * 6)].color,
    });
  }
}

resizeCanvas();

// Particle types with dragon-specific behavior
class Particle {
  constructor(x, y, color, vx, vy, life, size, type = 'circle') {
    this.x = x; this.y = y;
    this.color = color;
    this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life;
    this.size = size;
    this.type = type; // circle, diamond, drop, star
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 4;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    // Different gravity per type
    if (this.type === 'drop') this.vy += 50 * dt; // water drops fall faster
    else if (this.type === 'diamond') this.vy += 8 * dt; // ice floats
    else if (this.type === 'star') this.vy -= 15 * dt; // snow rises
    else this.vy += 30 * dt; // standard
    this.rotation += this.rotSpeed * dt;
    this.life -= dt;
  }
  draw(ctx) {
    const alpha = Math.max(0, this.life / this.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);

    if (this.type === 'diamond') {
      // Ice: sharp diamond shapes
      const s = this.size * alpha;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.6, 0);
      ctx.lineTo(0, s);
      ctx.lineTo(-s * 0.6, 0);
      ctx.closePath();
      ctx.fill();
    } else if (this.type === 'drop') {
      // Water: teardrop shapes
      const s = this.size * alpha;
      ctx.beginPath();
      ctx.arc(0, s * 0.3, s * 0.7, 0, Math.PI * 2);
      ctx.fill();
    } else if (this.type === 'star') {
      // Snow: 4-pointed star sparkle
      const s = this.size * alpha;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const r = i % 2 === 0 ? s : s * 0.4;
        const a = (Math.PI * 2 * i) / 8;
        i === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
    } else if (this.type === 'ember') {
      // Fire/lava: glowing circles with radial glow
      const s = this.size * alpha;
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 2);
      grd.addColorStop(0, this.color);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(0, 0, s * 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (this.type === 'pearl') {
      // Sea: soft circular glow
      const s = this.size * alpha;
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 1.8);
      grd.addColorStop(0, this.color);
      grd.addColorStop(0.6, this.color + '80');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(0, 0, s * 1.8, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Default circle
      ctx.beginPath();
      ctx.arc(0, 0, this.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

class CelebrationBurst {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    this.life = 2.5; this.maxLife = this.life;
    this.count = 60;
  }
  draw(ctx, time) {
    const alpha = Math.max(0, this.life / this.maxLife);
    const progress = 1 - alpha;
    for (let i = 0; i < this.count; i++) {
      const angle = (Math.PI * 2 * i) / this.count;
      const dist = progress * 180 + i * 2;
      const px = this.x + Math.cos(angle + time * 0.5) * dist;
      const py = this.y + Math.sin(angle + time * 0.5) * dist + progress * 60;
      ctx.globalAlpha = alpha * (1 - progress * 0.5);
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(px, py, 2 * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
    this.life -= 1/60;
  }
}

function getParticleType(dragon) {
  switch(dragon) {
    case 'ice': return 'diamond';
    case 'lava': return 'ember';
    case 'water': return 'drop';
    case 'sea': return 'pearl';
    case 'fire': return 'ember';
    case 'snow': return 'star';
    default: return 'circle';
  }
}

function spawnBurst(dragon) {
  const scale = DRAGON_SCALES[dragon];
  if (!scale) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  const count = 40;
  const type = getParticleType(dragon);

  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
    let speed = 60 + Math.random() * 140;
    let vx = Math.cos(angle) * speed;
    let vy = Math.sin(angle) * speed - 40;

    // Dragon-specific motion tweaks
    if (dragon === 'lava' || dragon === 'fire') {
      // Rise upward more
      vy -= 40;
      speed *= 0.8 + Math.random() * 0.4;
    } else if (dragon === 'water') {
      // Flow side-to-side more
      vx *= 1.3;
    } else if (dragon === 'snow') {
      // Float upward with gentle drift
      vy = -40 - Math.random() * 30;
      vx *= 0.6;
    }

    const life = 1.0 + Math.random() * 1.2;
    const size = 2 + Math.random() * 4;
    particles.push(new Particle(
      cx + (Math.random()-0.5)*40,
      cy + (Math.random()-0.5)*40,
      scale.color, vx, vy, life, size, type
    ));
  }
}

function spawnCelebration() {
  const rect = canvas.parentElement.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  dragonNames.forEach((d, i) => {
    const ox = (i - 2.5) * 70;
    const oy = (Math.random() - 0.5) * 60;
    celebrationBursts.push(new CelebrationBurst(cx + ox, cy + oy, DRAGON_SCALES[d].color));
  });
}

let globalTime = 0;
let lastTime = 0;
function renderLoop(ts) {
  const dt = lastTime ? Math.min((ts - lastTime) / 1000, 0.05) : 0;
  lastTime = ts;
  globalTime += dt;

  const rect = canvas.parentElement.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;

  // Fade trail
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(26, 22, 48, 0.15)';
  ctx.fillRect(0, 0, w, h);

  // Draw ambient orbs
  ambientOrbs.forEach(orb => {
    orb.x += orb.vx * dt;
    orb.y += orb.vy * dt;
    orb.phase += orb.speed * dt;
    // Wrap around
    if (orb.x < -10) orb.x = w + 10;
    if (orb.x > w + 10) orb.x = -10;
    if (orb.y < -10) orb.y = h + 10;
    if (orb.y > h + 10) orb.y = -10;

    const pulse = 0.15 + 0.1 * Math.sin(orb.phase);
    const grd = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.r * orb.r * 6);
    grd.addColorStop(0, orb.color + Math.round(pulse * 255).toString(16).padStart(2, '0'));
    grd.addColorStop(1, 'transparent');
    ctx.globalAlpha = 1;
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(orb.x, orb.y, orb.r * orb.r * 6, 0, Math.PI * 2);
    ctx.fill();

    // Core dot
    ctx.globalAlpha = pulse * 2;
    ctx.fillStyle = orb.color;
    ctx.beginPath();
    ctx.arc(orb.x, orb.y, orb.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // Glow layer for active particles
  ctx.globalCompositeOperation = 'screen';
  particles.forEach(p => {
    const alpha = Math.max(0, p.life / p.maxLife) * 0.15;
    ctx.globalAlpha = alpha;
    const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 6);
    grd.addColorStop(0, p.color);
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 6, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.globalCompositeOperation = 'source-over';

  // Update and draw particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.update(dt);
    p.draw(ctx);
  });

  // Draw celebration bursts
  celebrationBursts = celebrationBursts.filter(b => b.life > 0);
  celebrationBursts.forEach(b => b.draw(ctx, globalTime));

  ctx.globalAlpha = 1;
  rafId = requestAnimationFrame(renderLoop);
}
rafId = requestAnimationFrame(renderLoop);

// ─── Interaction Logic ──────────────────────────────────
const dragonNames = ['ice', 'lava', 'water', 'sea', 'fire', 'snow'];
const activated = new Set();
let lastDragon = 0;
let comboCount = 0;
let isComplete = false;

const stageLabel = document.getElementById('stage-label');
const comboDisplay = document.getElementById('combo-display');
const progressFill = document.getElementById('progress-fill');
const resetBtn = document.getElementById('reset-btn');

function updateComboDisplay() {
  const count = activated.size;
  if (count === 0) {
    comboDisplay.textContent = '';
    comboDisplay.classList.remove('lit');
    stageLabel.textContent = 'Tap a dragon to begin';
    stageLabel.classList.remove('lit');
  } else if (count < 6) {
    const names = Array.from(activated).map(d => d.charAt(0).toUpperCase() + d.slice(1));
    stageLabel.textContent = names.join(' • ');
    stageLabel.classList.add('lit');
    comboDisplay.textContent = `${count} / 6 dragons awakened`;
    comboDisplay.classList.add('lit');
  } else {
    comboDisplay.textContent = '✦ ALL DRAGONS AWAKENED ✦';
    comboDisplay.classList.add('lit');
    stageLabel.textContent = 'The crew is complete';
    stageLabel.classList.add('lit');
  }
  progressFill.style.width = `${(count / 6) * 100}%`;
}

function activateDragon(dragon) {
  if (isComplete) return;
  lastDragon = dragonNames.indexOf(dragon);

  // Audio
  playDragonSound(dragon);

  // Visual
  spawnBurst(dragon);

  // Button feedback
  const btn = document.querySelector(`[data-dragon="${dragon}"]`);
  btn.classList.add('active');
  setTimeout(() => btn.classList.remove('active'), 400);

  // Track activation
  if (!activated.has(dragon)) {
    activated.add(dragon);
    btn.classList.add('awakened');
    comboCount++;
  }

  updateComboDisplay();

  // Check completion
  if (activated.size === 6) {
    isComplete = true;
    resetBtn.style.display = 'inline-block';
    setTimeout(() => {
      playCompletionChord();
      spawnCelebration();
    }, 250);
  }
}

function resetGame() {
  playResetSound();
  activated.clear();
  comboCount = 0;
  isComplete = false;
  particles = [];
  celebrationBursts = [];
  resetBtn.style.display = 'none';
  document.querySelectorAll('.dragon-btn').forEach(b => b.classList.remove('awakened', 'active'));
  updateComboDisplay();
}

// Button click handlers
document.querySelectorAll('.dragon-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    ensureAudioContext();
    activateDragon(btn.dataset.dragon);
  });

  btn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      ensureAudioContext();
      activateDragon(btn.dataset.dragon);
    }
  });
});

// Mute toggle
document.getElementById('mute-btn').addEventListener('click', () => {
  ensureAudioContext();
  toggleMute();
});

// Harmony mode toggle
document.getElementById('harmony-btn').addEventListener('click', () => {
  harmonyMode = !harmonyMode;
  const btn = document.getElementById('harmony-btn');
  btn.textContent = harmonyMode ? '🎵 Harmony ON' : '🎵 Harmony';
  btn.style.borderColor = harmonyMode ? 'rgba(129,140,248,0.5)' : '';
});

// Reset button
resetBtn.addEventListener('click', resetGame);
resetBtn.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    resetGame();
  }
});

// Keyboard shortcuts: keys 1-6 trigger each dragon, R resets
document.addEventListener('keydown', (e) => {
  const num = parseInt(e.key);
  if (num >= 1 && num <= 6) {
    ensureAudioContext();
    const dragon = dragonNames[num - 1];
    activateDragon(dragon);
  }
  if (e.key.toLowerCase() === 'm') {
    ensureAudioContext();
    toggleMute();
  }
  if (e.key.toLowerCase() === 'h') {
    harmonyMode = !harmonyMode;
    const btn = document.getElementById('harmony-btn');
    btn.textContent = harmonyMode ? '🎵 Harmony ON' : '🎵 Harmony';
    btn.style.borderColor = harmonyMode ? 'rgba(129,140,248,0.5)' : '';
  }
  if (e.key.toLowerCase() === 'r') {
    resetGame();
  }
});

// Init
updateComboDisplay();
</script>
